summary:
  copy:
    headline: Archive of pure AI weather-model reforecasts
    lede: The AI Weather Prediction (AIWP) archive collects multi-year, twice-daily global 10-day reforecasts
      from leading machine-learning weather models, citable via Radford et al. (2025, BAMS).
    text: AIWP is an archive of pure AI-based numerical weather prediction reforecasts, assembled to let
      the community evaluate and compare machine-learning weather models against one another. It currently
      covers FourCastNet v1, FourCastNet v2-small, Pangu-Weather, and GraphCast Operational, with a period
      of record running roughly from 30 September 2020 to the present. Runs are initialized at 00 and
      12 UTC across all years, plus 06 and 18 UTC for 2023. Output is organized into one top-level directory
      per model/version/initial-condition combination, named MMMM_vNNN_III and partitioned by year and
      date (YYYY/mmdd/) as NetCDF files; a separate Derived folder adds calculated severe-weather parameters.
      As of January 2025 the archive also began adding IFS-initialized versions of each model alongside
      the GFS-initialized output. Real-time visualizations are at aiweather.cira.colostate.edu, and use
      is documented in Radford et al. (2025, BAMS, https://doi.org/10.1175/BAMS-D-24-0057.1). NOAA provides
      the data "as is."
  refs:
  - aiwp-readme

