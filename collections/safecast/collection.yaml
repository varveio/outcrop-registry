summary:
  copy:
    headline: Global volunteer-collected open radiation and air-quality measurements
    lede: Safecast is a worldwide citizen-science dataset of crowdsourced radiation and air-quality readings,
      started after the 2011 Fukushima disaster and released into the public domain under CC0.
    text: Safecast is a global, volunteer-driven environmental monitoring project launched in 2011 in
      the aftermath of the Fukushima Daiichi nuclear accident, when reliable, openly available radiation
      data was scarce. Volunteers collect measurements with mobile and fixed Geiger-counter devices (and
      later air-quality sensors), and Safecast publishes the readings as an open dataset that has grown
      into one of the largest collections of background-radiation measurements ever assembled. The data
      is released into the public domain under a CC0 designation so anyone can use, copy, and redistribute
      it under any circumstance, and it is accessible anonymously through the api.safecast.org API, a
      full-dataset CSV download, and bulk exports mirrored to public AWS storage.
  refs:
