summary:
  copy:
    headline: Single-cell transcriptomic atlas of 20 mouse organs
    lede: Tabula Muris is a Chan Zuckerberg Biohub compendium of single-cell transcriptome data from Mus
      musculus, spanning nearly 100,000 cells across 20 organs and tissues.
    text: 'Tabula Muris is a single-cell RNA-sequencing atlas of the laboratory mouse generated by the
      Chan Zuckerberg Biohub and the Tabula Muris Consortium, underlying the 2018 Nature paper "Single-cell
      transcriptomics of 20 mouse organs creates a Tabula Muris." It profiles more than 100,000 cells
      from 20 organs and tissues using two complementary methods: microfluidic droplet-based 3''-end counting
      (10x Genomics), which surveys thousands of cells per organ at lower coverage, and FACS-based full-length
      transcript analysis (Smart-seq2), which trades throughput for higher sensitivity and coverage. The
      resulting cell-type annotations support direct comparison of gene expression for cell types shared
      across tissues, characterization of poorly described populations, and benchmarking of dataset-integration
      and batch-effect methods. On AWS this S3 bucket holds the raw sequence alignments for both methods
      as sorted BAM files with indexes, alongside processed expression matrices and metadata.'
