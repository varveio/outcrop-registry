summary:
  copy:
    headline: Multimodal autonomous-driving dataset with full 360 sensor suite
    lede: nuScenes is Motional's large-scale autonomous-driving dataset — 1,000 driving scenes from Boston
      and Singapore captured with cameras, lidar, and radar and fully annotated with 3D boxes.
    text: 'nuScenes, developed by Motional (formerly nuTonomy/Aptiv), captures 1,000 twenty-second driving
      scenes from Boston and Singapore using a real self-driving car''s full sensor suite: 6 cameras,
      1 lidar, and 5 radars, each with 360-degree field of view, plus raw CAN-bus signals (velocity, steering,
      wheel speeds). Every scene is annotated with 3D bounding boxes spanning 23 object classes and 8
      attributes, totalling roughly 1.4 million boxes over about 1.4 million camera images. The S3 bucket
      also distributes the related Motional releases nuImages (2D image annotations) and nuPlan (a closed-loop
      planning benchmark). Faces and license plates are detected and blurred for privacy. The data is
      published for non-commercial research under CC BY-NC-SA 4.0; commercial use requires a separate
      license from Motional.'
