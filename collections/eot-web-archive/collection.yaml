summary:
  copy:
    headline: U.S. Government web preserved at presidential transitions
    lede: The End of Term Web Archive is a collaborative initiative that crawls and preserves U.S. federal
      government websites at the end of each presidential administration, with cycles from 2004 through
      2024.
    text: The End of Term Web Archive captures the federal government web — Legislative, Executive, and
      Judicial branch sites across .gov, .mil, and related domains — in the final months of each administration
      and again after the transition, documenting how the government's online presence changes. Begun
      in 2008 by partners in the International Internet Preservation Consortium and NDIIPP, it is collected
      and stewarded by the Internet Archive, the Library of Congress, and the University of North Texas
      Libraries, with Stanford, George Washington University, the U.S. Government Publishing Office, the
      California Digital Library, and (in 2024) ArchiveTeam, the Common Crawl Foundation, the Library
      Innovation Lab at Harvard, and Webrecorder among the contributors. The AWS-hosted copy, produced
      under the AWS Open Data Sponsorship Program, packages each cycle (2004, 2008, 2012, 2016, 2020,
      2024) as web-crawl captures in WARC format alongside CDX and columnar URL indexes for computational
      use, ranging from the 6.42 TB 2004 set to the 2.29 PB 2024 crawl.
