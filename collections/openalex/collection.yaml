summary:
  copy:
    headline: Open scholarly graph of works, authors, sources, and citations
    lede: OpenAlex is OurResearch's open index and catalog of the global scholarly record — works, authors,
      sources, institutions, topics, publishers, funders, and awards — published as a complete, joinable
      S3 snapshot.
    text: 'OpenAlex, published by the nonprofit OurResearch, is an open index and catalog of the global
      scholarly record: a heterogeneous graph of hundreds of millions of entities and billions of connections
      among them. It covers more than twenty entity types — works (journal articles, books, datasets,
      theses), authors, sources, institutions, topics, keywords, publishers, funders, and awards — all
      sharing OpenAlex IDs so they join into a single interlinked graph rather than independent tables,
      and look up by external identifiers such as DOI, ORCID, ROR, and PMID. Beyond the free website and
      API, the complete database is offered as a downloadable snapshot in the openalex S3 bucket: gzip-compressed
      JSON Lines, one record per line, with one folder per entity type and records partitioned by updated_date.
      The bucket is public and reachable anonymously (AWS CLI --no-sign-request); the free tier refreshes
      on a quarterly cadence, with monthly snapshots and daily change files on paid plans. OurResearch,
      the steward behind OpenAlex, also operates Unpaywall and other open-scholarship infrastructure,
      and positions OpenAlex as a comprehensive alternative to proprietary indexes such as the former
      Microsoft Academic Graph, Scopus, and Web of Science.'
  refs:
  - openalex-intro-identity
  - openalex-snapshot-format

