summary:
  copy:
    headline: Validated, quality-controlled distribution of OpenStreetMap
    lede: Daylight is a free, tested distribution of global OpenStreetMap data curated by Meta's Daylight
      Map team and published under the Open Database License.
    text: Daylight packages a stable, validated snapshot of the global OpenStreetMap map together with
      derived cartographic layers, combining community OSM contributions with quality and consistency
      checks so downstream users get a reproducible street-scale world map. Beyond the standard planet
      PBF, it ships two Athena-optimized Parquet variants — osm_features (nearly one billion renderable
      geometries) and osm_elements (the full model, including all seven billion nodes and geometry-less
      relations) — plus the Earth Table classification and derived landcover, urban-areas, and label-centerline
      layers. Releases are versioned and refreshed quarterly, and the whole distribution is open data
      under ODbL with attribution to OpenStreetMap contributors.
  refs:
  - daylight-registry
  - daylight-homepage
  - daylight-attribution

