    lede: Numbered, validated snapshots of the OpenStreetMap planet plus optional admin, building, coastline,
      and ML-road layers, downloadable per version.
    text: Each Daylight release is a tested, reproducible snapshot of the global OpenStreetMap planet,
      published under a version number (e.g. v1.26) so users can pin a stable map. A release bundles the
      complete planet in OSM PBF together with optional derived layers — administrative boundaries, building
      footprints, coastlines, and ML-detected roads — plus translation tables and a curated major-features
      library. Daylight planet files are composed of 100% OSM data, released under the terms of the Open
      Database License.
