- id: m3ed-datafiles
  kind: publisher_doc
  url: https://m3ed.io/data_overview/datafiles/
  label: M3ED Data Files documentation (HDF5 layout, m3ed.io)
  excerpt: data.h5 with events, grayscale and RGB imagers, LiDAR, and IMU data. The grayscale stereo pair
    is stored in the groups /ovc/left and /ovc/right. IMU data is recorded in the group /ovc/imu. This
    data was recorded with an Ouster OS1-64-U in the group /ouster.
  retrieved_at: '2026-06-22'

- id: m3ed-folders
  kind: publisher_doc
  url: https://m3ed.io/data_overview/folderst/
  label: M3ED Folder Structure documentation (m3ed.io)
  excerpt: 'Each sequence is recorded individually in the processed folder. data.h5: time synchronized
    and event decoded. Use these files to access the event camera data, the grayscale and RGB imagers,
    the lidar, and the IMU. depth_gt.h5: ground truth depth and poses from FasterLIO, for the left event
    camera. pose_gt.h5: similar to depth_gt.h5, but without the depth information. semantics.h5: InternImage
    semantic outputs.'
  retrieved_at: '2026-06-22'

- id: m3ed-homepage
  kind: publisher_homepage
  url: https://m3ed.io/
  label: M3ED project homepage (m3ed.io)
  excerpt: M3ED is the first multi-sensor event camera dataset focused on high-speed dynamic motions in
    robotics applications. M3ED provides high-quality synchronized and labeled data from multiple platforms,
    including ground vehicles, legged robots, and aerial robots.
  retrieved_at: '2026-06-22'

- id: m3ed-input
  kind: publisher_doc
  url: https://m3ed.io/data_overview/folderst/
  label: M3ED Input Files documentation (raw_bags & lidar_calibrations, m3ed.io)
  excerpt: 'Input Files: These are the files that are used by the build system to generate the h5 files.
    raw_bags: stores the unprocessed data obtained from the sensor tower. These files are not time corrected
    and events are stored in binary format. lidar_calibrations (npz): stores the manually tuned LiDAR
    calibrations. Multiple bags can share the same calibration file.'
  retrieved_at: '2026-06-22'

