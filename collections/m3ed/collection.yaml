summary:
  copy:
    headline: Multi-robot, multi-sensor event-camera dataset for high-speed robotics
    lede: M3ED is a synchronized event-camera, frame, LiDAR and IMU dataset from cars, quadrupeds, and
      drones, published by the University of Pennsylvania under CC BY-SA 4.0.
    text: M3ED (Multi-Robot, Multi-Sensor, Multi-Environment Event Dataset) captures high-speed dynamic
      motion for robotics, pairing stereo Prophesee event cameras (1280x720) with grayscale and RGB imagers,
      a 64-beam Ouster LiDAR, and an IMU, all time-synchronized and event-decoded. Recordings span three
      platforms - wheeled vehicles (car), legged robots (spot), and aerial robots (falcon) - across forest,
      urban, indoor and outdoor environments, by day and night. Each sequence ships as an HDF5 file alongside
      FasterLIO depth and pose ground truth, InternImage semantic outputs, Kalibr camera/LiDAR calibration,
      and preview videos. The dataset accompanies the CVPR 2023 Workshop on Event Vision paper by Chaney,
      Cladera, Wang, Bisulco, Hsieh, Korpela, Kumar, Taylor, and Daniilidis.
  refs:
