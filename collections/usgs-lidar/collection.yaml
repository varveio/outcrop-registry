summary:
  copy:
    headline: USGS 3DEP lidar published as cloud-streamable Entwine Point Tiles
    lede: Nationwide USGS 3D Elevation Program (3DEP) lidar point clouds, reprocessed by Hobu, Inc. into
      streamable Entwine Point Tiles (EPT) and openly published on AWS as U.S. government public-domain
      data.
    text: The USGS 3D Elevation Program (3DEP) collects high-resolution lidar elevation data across the
      conterminous United States, Hawaii, and U.S. territories. Hobu, Inc., with the U.S. Army Corps of
      Engineers CRREL and the AWS Public Datasets team, reprocessed these point clouds into Entwine Point
      Tiles (EPT) — a lossless, full-density, streamable octree based on LASzip (LAZ) encoding — so the
      data can be queried and visualized directly in the cloud rather than downloaded wholesale. Resources
      are named for their USGS acquisition projects and span more than 10 trillion points across over
      950 distinct resources, with raw LAZ available in a sibling Requester Pays bucket. As 3DEP elevation
      data, it is provided unlicensed, free, and open to the public.
  refs:
