summary:
  copy:
    headline: Airborne LiDAR point cloud of the city of São Paulo
    lede: The PMSP LiDAR Point Cloud is São Paulo City Hall's aerial-survey LiDAR of the entire municipality,
      published openly by GeoSampa as a full-density Entwine Point Tile octree.
    text: 'Acquired by aerial survey beginning in 2017, this is the LiDAR point cloud behind the Mapa
      3D Digital da Cidade (M3DC) of the Prefeitura Municipal de São Paulo. It covers the full municipal
      area — on the order of 1,600 km² and tens of billions of returns — surveyed to PEC PCD Class ''A''
      cartographic accuracy in the EPSG:31983 (SIRGAS 2000 / UTM 23S) reference frame. The point cloud
      is published in the Entwine Point Tile (EPT) format: a lossless, full-density octree of LASzip-compressed
      (.laz) tiles that streams directly to web point-cloud viewers and to PDAL/Entwine processing without
      a full download. The same data is also distributed as plain LAZ tiles and through the GeoSampa portal;
      the AWS Open Data copy mirrors the EPT build for cloud-native access. The collection is intended
      to grow as further surveys are flown on demand.'
