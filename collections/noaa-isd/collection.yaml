  label: NCEI ISD-Lite Technical Document
  excerpt: 'The ISD-Lite product is designed to be an easier to work with subset of the larger Integrated
    Surface Data hourly dataset. ISD-Lite contains eight common hourly time-series climatological variables
    represented in a fixed-width format. The elements extracted are: 1. Air temperature; 2. Dew point
    temperature; 3. Sea level pressure; 4. Wind direction; 5. Wind speed; 6. Total cloud cover; 7. One-hour
    accumulated liquid precipitation; 8. Six-hour accumulated liquid precipitation.'
  retrieved_at: '2026-06-22'

