summary:
  copy:
    headline: Global hourly and synoptic surface weather observations
    lede: The Integrated Surface Database (ISD) is NOAA NCEI's global archive of hourly and synoptic land-surface
      weather observations, integrated from more than 100 sources into a single common format.
    text: 'The Integrated Surface Database integrates hourly and synoptic surface observations from over
      35,000 stations worldwide into one common ASCII format and data model, drawing on more than 100
      original data sources with records reaching back to 1901 and over 14,000 stations updated daily.
      Each station-year file carries the full observed parameter set: wind speed and direction, gust,
      temperature, dew point, cloud data, sea-level and station pressure, altimeter setting, present weather,
      visibility, precipitation over several accumulation periods, and snow depth. Alongside the full
      database, NCEI publishes ISD-Lite, a fixed-width subset of eight common parameters intended for
      trend and climatological work, plus station-history, inventory, format documentation, and reader
      software. Produced by NOAA''s National Centers for Environmental Information and mirrored on AWS
      as part of the NOAA Open Data Dissemination program.'
