- prefix: auckland/
  copy:
    headline: Auckland region imagery surveys
    lede: Imagery whose main coverage is the Auckland region, organised by survey, product and coordinate
      reference system as STAC-described Cloud Optimised GeoTIFFs.
    text: 'Imagery whose main coverage is the Auckland region, drawn from the imagery types LINZ publishes
      to the bucket: urban and rural aerial photos, near-infrared products where captured, and historical
      scanned surveys from the Crown Aerial Film Library (survey numbers starting SN). Following LINZ''s
      naming convention, each dataset is stored by region then by survey, product and coordinate reference
