summary:
  copy:
    headline: New Zealand's publicly owned aerial and satellite imagery as STAC-described COGs
    lede: New Zealand Imagery is Toitū Te Whenua Land Information New Zealand's open archive of the country's
      publicly owned aerial and satellite imagery, shared as Cloud Optimised GeoTIFFs via the Registry
      of Open Data on AWS.
    text: 'Toitū Te Whenua Land Information New Zealand (LINZ) makes New Zealand''s most up-to-date publicly
      owned aerial imagery freely available under an open licence, working with regional councils to publish
      it. The archive reaches roughly 95% of Aotearoa New Zealand and is also reachable through the LINZ
      Data Service and LINZ Basemaps. It contains several imagery types captured for different purposes:
      urban aerial photos at finer specifications over town and city extents; rural aerial photos at typically
      20-30cm resolution with regional coverage; annual cloud-free satellite mosaics built from European
      Space Agency Sentinel-2 imagery for full national coverage; near-infrared products published alongside
      their RGB counterparts; historical scanned film from the Crown Aerial Film Library; and emergency-response
      captures. Imagery is organised by the main region each dataset covers, with datasets spanning two
      or more full regions placed under new-zealand, and within a region by survey, product and coordinate
      reference system. Every survey carries a STAC Collection naming its licensor. The bucket sits in
      ap-southeast-2 and is reachable without an AWS account, e.g. aws s3 ls --no-sign-request s3://nz-imagery/.'
