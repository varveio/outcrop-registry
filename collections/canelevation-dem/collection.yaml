summary:
  copy:
    headline: Canada's national digital elevation models from NRCan
    lede: The CanElevation Series is Natural Resources Canada's collection of digital elevation models
      for Canada, spanning high-resolution lidar terrain in the south, satellite-derived surface models
      in the north, and a complete 30 m mosaic.
    text: The CanElevation Series is the elevation-data program Natural Resources Canada produces in support
      of the National Elevation Data Strategy. It opens with the High Resolution Digital Elevation Model
      (HRDEM) — Digital Terrain Models and Digital Surface Models derived from airborne lidar across southern
      Canada and from satellite imagery in the north, offered at 1 m or 2 m and gradually extending toward
      complete national coverage. The series also includes the Medium Resolution Digital Elevation Model
      (MRDEM), a 30 m mosaic that fuses the Copernicus DEM (GLO-30) with the lidar HRDEM to give gap-free
      coverage of the Canadian landmass, replacing the retired Canadian Digital Elevation Model (CDEM).
      All products are referenced to the Canadian Geodetic Vertical Datum of 2013 (CGVD2013) and published
      under the Open Government Licence – Canada, free of charge and without restriction.
  refs:
  - canelevation-hrdem-catalog
  - canelevation-mrdem-catalog

