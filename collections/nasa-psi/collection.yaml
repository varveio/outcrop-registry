summary:
  copy:
    headline: NASA's open repository for physical-sciences experiment data
    lede: Physical Sciences Informatics (PSI) is NASA's open repository for physical-sciences experiment
      data from the ISS, Space Shuttle, free-flyers, and ground analogs.
    text: Physical Sciences Informatics (PSI) is the open repository of NASA's Biological and Physical
      Sciences (BPS) division for physical-sciences experiment data drawn from the International Space
      Station, Space Shuttle, free-flyers, and ground analogs. Alongside the Open Science Data Repository
      (OSDR) for biological data, it provides open access to spaceflight and ground-study datasets so
      that researchers can reuse them for discovery and innovation. PSI is governed by the BPS Data Management
      Policy and presented as part of NASA's open-science mission, with a search interface and submission
      portal for exploring and contributing physical-sciences data.
  refs:
  - nasa-psi-bps-data-doc

