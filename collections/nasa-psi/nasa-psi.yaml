    text: Plasma Kristall-4 (PK-4) is a joint Russian-European laboratory for the investigation of complex
      (dusty) plasmas aboard the ISS, located in the ESA Columbus module. In the NASA PSI repository it
      is registered as investigation PSI-5.
  note: Each `pk4_cNN_r1-2-3` sub-directory is one sequentially-numbered campaign of the single Plasma
    Kristall-4 experiment, not a separate dataset.
