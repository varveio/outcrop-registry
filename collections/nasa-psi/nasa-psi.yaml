- prefix: DSI/
  copy:
    headline: DSI — directional solidification of transparent alloys in microgravity
    lede: The DECLIC Directional Solidification Insert (DSI) provides in situ, real-time characterization
      of solid-liquid interface patterns during directional solidification in microgravity.
    text: The DECLIC Directional Solidification Insert (DSI) provides in situ, real-time characterization
      of solid-liquid interface patterns as transparent model alloys undergo directional solidification
      in microgravity. Observing this growth in microgravity isolates the physics that selects solidification
      patterns, which is otherwise obscured on the ground.
  refs:
  - dsi-investigation

- prefix: OASIS/
  copy:
    headline: OASIS — smectic liquid-crystal films in microgravity
    lede: Observation and Analysis of Smectic Islands In Space (OASIS) probes the interfacial and hydrodynamic
      behavior of freely suspended liquid-crystal films in space.
    text: Observation and Analysis of Smectic Islands In Space (OASIS) probes the interfacial and hydrodynamic
      behavior of freely suspended liquid-crystal films aboard the ISS — the thinnest known stable condensed-phase
      structures. Studying these films in space removes gravity-driven effects, isolating the physics
      that governs how the films behave and flow.
  refs:
  - oasis-investigation

