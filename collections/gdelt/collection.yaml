summary:
  copy:
    headline: Open database of the world's news media
    lede: The GDELT Project is an open database of global society, monitoring broadcast, print, and web
      news from nearly every country in over 100 languages.
    text: 'The GDELT Project describes itself as the largest, most comprehensive, and highest-resolution
      open database of human society ever created. Supported by Google Jigsaw, it monitors the world''s
      broadcast, print, and web news every second of every day and identifies the people, locations, organizations,
      counts, themes, sources, emotions, quotes, images, and events driving global society; the 2015 data
      alone records nearly three quarters of a trillion emotional snapshots and more than 1.5 billion
      location references, and the total archive spans more than 215 years. GDELT comes in two generations:
      the GDELT 1.0 Event Database, with over a quarter-billion English-language records dating to 1979
      and updated daily, and the GDELT 2.0 streams (released February 2015), which add events in the 65
      live-translated languages, introduce a Mentions table, and update every 15 minutes across the Event,
      Mentions, and Global Knowledge Graph products. The data is published on AWS as the anonymously accessible
      gdelt-open-data S3 bucket in us-east-1, released as tab-delimited CSV — the files carry a `.csv`
      extension but are tab-delimited, not comma-separated — with an SNS topic announcing new files; the
      bucket is currently noted as no longer being updated.'
