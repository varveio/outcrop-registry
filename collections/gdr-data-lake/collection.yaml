summary:
  copy:
    headline: Large-scale geothermal field datasets from DOE-funded projects
    lede: The GDR Data Lake is the alternative-storage tier of the U.S. DOE Geothermal Data Repository,
      carrying the largest and most complex datasets from Geothermal Technologies Office projects under
      CC BY 4.0.
    text: 'The Geothermal Data Repository (GDR) gives free access to data generated by projects funded
      by the U.S. Department of Energy''s Office of Geothermal, managed by the National Renewable Energy
      Laboratory (NREL). The Data Lake is its alternative-storage model for especially large or complex
      datasets — typically terabyte-scale or in hierarchical formats — curated for consistency before
      release. It contains high-value geothermal field data from DOE Geothermal Technologies Office projects:
      distributed acoustic sensing, downhole geophone and accelerometer recordings, active- and passive-source
      seismic monitoring, and seismic-reflection surveys drawn from the EGS Collab experiments at SURF,
      Utah FORGE, the Imperial Valley dark-fiber project, the WHOLESCALE surveys in Nevada, and the Soda
      Lake field. Storage is covered by the AWS Open Data Sponsorship Program, and content is available
      under CC BY 4.0 unless otherwise noted. It is a sister data lake to DOE''s Open Energy Data Initiative
      (OEDI) Data Lake.'
