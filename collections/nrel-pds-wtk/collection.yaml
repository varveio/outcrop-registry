summary:
  copy:
    headline: Modeled U.S. and international wind resource for grid integration
    lede: The WIND Toolkit is NREL's archive of physics-modeled wind resource time series — wind speed,
      direction, and meteorology — published openly under CC-BY-4.0 through DOE's Open Energy Data Initiative.
    text: 'The Wind Integration National Dataset (WIND) Toolkit is NREL''s modeled wind resource archive,
      distributed via DOE''s Open Energy Data Initiative. Its core North American product was produced
      with the Weather Research and Forecasting (WRF) model at 2-km resolution for 2007-2014, providing
      wind speed and direction at 10-200 m hub heights along with temperature, pressure, precipitation,
      humidity, and atmospheric stability.


      Over time it has grown into a family of related NREL releases that share its WRF modeling lineage:
      the NOW-23 offshore wind resource, which supersedes the original Toolkit''s offshore component;
      the WIND Toolkit Long-Term Ensemble Dataset (WTK-LED) with model-uncertainty estimates; bias-corrected
      NOAA HRRR data; Sup3rWind machine-learning super-resolution outputs; the Puerto Rico PR100 assessment;
      and a set of international wind resource datasets. The data is published under CC-BY-4.0 in the
      AWS Open Data bucket nrel-pds-wtk (us-west-2) and is readable anonymously with no AWS account.'
  refs:
  - wtk-oedi-terms
  - wtk-led-oedi
  - now23-oedi

