- prefix: sup3rwind/
  copy:
    headline: 'Sup3rWind: machine-learning super-resolution wind from reanalysis'
    lede: Sup3rWind is NREL's generative-ML approach that downscales coarse ERA5 reanalysis to 2-km, 5-minute
      wind resource data, together with its models and inputs.
    text: Sup3rWind (Super-Resolution for Renewable Energy Resource Data with Wind from Reanalysis) is
      NREL's generative machine-learning approach that downscales coarse ERA5 reanalysis (~30 km hourly)
      into high-resolution (2-km, 5-minute) wind resource data, trained against the WIND Toolkit. The
      layout separates regional outputs (south_america/, ukraine/ — covering Ukraine, Moldova, and parts
      of Romania for 2000-2023), the trained generative models (models/), the model training inputs (training_data/),
      and bias-correction inputs (bias_correction/). It is built with NREL's open-source rex and sup3r
      packages.
  refs:
  - sup3rwind-oedi

- prefix: sup3rwind/models/
  copy:
    headline: Sup3rWind trained models
    lede: The trained generative-ML model artifacts that produce the Sup3rWind super-resolution outputs.
    text: Trained Sup3rWind generative machine-learning model artifacts, built with NREL's sup3r package,
      that downscale ERA5 reanalysis into high-resolution wind resource data. This is a small set of model
      files that reproduce the regional Sup3rWind outputs.
  refs:
  - sup3rwind-oedi

- prefix: sup3rwind/south_america/
  copy:
    headline: Sup3rWind South America output
    lede: Super-resolution wind resource for South America generated by the Sup3rWind models.
    text: High-resolution (2-km, 5-minute) wind resource data for South America, produced by Sup3rWind
      downscaling ERA5 reanalysis with NREL's sup3r generative-ML models. It is stored as HDF5 and is
      the largest of the Sup3rWind regional outputs in the bucket.
  refs:
  - sup3rwind-oedi

- prefix: sup3rwind/training_data/
  copy:
    headline: Sup3rWind model training data
    lede: Paired coarse/fine training inputs used to train the Sup3rWind super-resolution models.
    text: 'Training inputs for the Sup3rWind super-resolution models: paired ERA5 reanalysis and WIND
      Toolkit (WTK) data used to learn the downscaling from coarse reanalysis to high-resolution wind
      fields. It is provided as HDF5 for model development and reproduction.'
  refs:
  - sup3rwind-oedi

- prefix: sup3rwind/ukraine/
  copy:
    headline: Sup3rWind Ukraine output
    lede: Super-resolution wind resource over Ukraine and its neighbors, motivated by decentralized grid
      rebuilding.
    text: High-resolution (2-km, 5-minute) wind resource over Ukraine, Moldova, and parts of Romania and
      the Black Sea for 2000-2023, produced by Sup3rWind downscaling ERA5 reanalysis with NREL's sup3r
      models. The Ukraine focus supports energy planning for a more decentralized rebuild of the Ukrainian
      power grid. It is stored as HDF5.
  refs:
  - sup3rwind-oedi

