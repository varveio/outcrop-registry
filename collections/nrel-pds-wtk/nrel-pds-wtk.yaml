      of its North American 4-km hourly climate ensemble (2001-2020) alongside higher-resolution releases.
      Releases are organized by version — v1.0.0/, a bias-corrected v1.0.0bc/, and v1.1.0/ — and stored
      as HDF5 with wind speed, direction, and meteorology at multiple hub heights.
  refs:
  - wtk-led-oedi

