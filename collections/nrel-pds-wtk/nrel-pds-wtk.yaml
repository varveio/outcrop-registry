- prefix: mid_atlantic_3d_pbl/
  copy:
    headline: Mid-Atlantic 3D planetary boundary layer dataset
    lede: Three-dimensional atmospheric boundary-layer fields over the Mid-Atlantic offshore domain.
    text: Three-dimensional planetary-boundary-layer (3D PBL) fields over the Mid-Atlantic offshore domain,
      extending the NOW-23 modeling to full 3D atmospheric output. Variables are organized by quantity
      — wind speed and direction (WSPD, WDIR), vertical velocity (W), turbulence kinetic energy and its
      budget terms (TKE, TKE_BUOY, TKE_DISS, TKE_SHEAR, TKE_VERT), pressure (PRES, PSFC), potential temperature
      (TPOT, TPOTV), boundary-layer height (PBLH), surface fluxes and roughness (HFX, UST, ZNT, TSK, SST),
      precipitation and humidity (PRECIP, RH) — plus coordinate arrays (height, lat, lon, time). It is
      stored as HDF5 across many per-timestep objects.
  refs:
  - wtk-aws-registry
  - wtk-mid-atlantic-3d-pbl
  boundary: pin

