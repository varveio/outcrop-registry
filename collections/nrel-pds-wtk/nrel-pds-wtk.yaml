  refs:
  - wtk-aws-registry

- prefix: bchrrr/
  copy:
    headline: Bias Corrected NOAA HRRR wind resource (BC-HRRR)
    lede: BC-HRRR is NREL's bias-corrected, interpolated NOAA HRRR wind data for grid-integration modeling.
    text: Bias Corrected NOAA HRRR (BC-HRRR) wind resource data for grid-integration applications, covering
      weather years 2015-2023. NREL processed native NOAA High-Resolution Rapid Refresh (HRRR) output
      and bias-corrected it through quantile mapping against the WIND Toolkit baseline, yielding very
      low residual bias against ground stations. It targets capacity-expansion, production-cost, and resource-adequacy
      modeling, used on its own or alongside the legacy WIND Toolkit, and is stored as HDF5.
  refs:
  - bchrrr-oedi

