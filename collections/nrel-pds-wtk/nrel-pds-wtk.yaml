- prefix: bangladesh/
  copy:
    headline: Bangladesh wind resource and measurement campaign
    lede: Modeled wind resource for Bangladesh together with ground measurement-station observations.
    text: Bangladesh wind resource from the WIND Toolkit's international datasets (covering roughly 2014-2017),
      produced through a WRF-based measurement-and-modeling campaign. Alongside the modeled fields (wrffields/)
      and soil-moisture/SOM outputs (soms/), the observations/ contents carry ground measurement-station
      records from sites across Bangladesh (e.g. Chandpur, Mirzapur, Mongla, Mymensingh, Rajshahi, Sitakunda)
      at one-minute, ten-minute, and hourly aggregations. It is stored as HDF5 and tabular data.
  refs:
  - wtk-aws-registry

- prefix: bangladesh/soms/
  copy:
