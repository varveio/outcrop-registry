- prefix: wtk-led/
  copy:
    headline: WIND Toolkit Long-Term Ensemble Dataset (WTK-LED)
    lede: WTK-LED is NREL's high-resolution wind time series with model-uncertainty estimates, the modern
      successor to the original WIND Toolkit.
    text: The WIND Toolkit Long-Term Ensemble Dataset provides high-resolution wind speed and meteorological
      time series along with interannual variability and per-grid-point model-uncertainty estimates. It
      combines a 2-km, 5-minute WRF product over CONUS and Alaska for 2018-2020 with a 4-km, hourly climate
      ensemble (Argonne National Laboratory simulations) spanning 2001-2020 across North America — CONUS,
      Alaska, Canada, most of Mexico, and the Caribbean. The vertical grid resolves many boundary-layer
      levels across the turbine rotor zone, and the data is stored as HDF5.
  refs:
  - wtk-led-oedi

