    text: A techno-economic subset of the WIND Toolkit used for wind cost and siting analysis. Its pywtk-data/
      contents are the per-site data assets consumed by the pyWTK access library — site time series and
      metadata indexed by site identifier, spread across many small objects — and are provided in netCDF/HDF5.
  refs:
  - wtk-aws-registry

- prefix: wtk-us/
  copy:
    headline: WTK-US gridded continental wind data (legacy)
    lede: The original gridded continental-U.S. WIND Toolkit data product.
    text: Legacy gridded continental-U.S. WIND Toolkit data (WTK-US), the original 2-km WRF-modeled wind
      resource covering roughly 2007-2013 with wind speed and direction and meteorology at 10-200 m hub
      heights. Stored as HDF5, it is the foundational national dataset that the later WTK-LED and regional
      releases build on.
  refs:
  - wtk-aws-registry

