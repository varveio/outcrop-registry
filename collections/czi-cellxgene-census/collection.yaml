summary:
  copy:
    headline: Queryable single-cell corpus from CZ CELLxGENE Discover
    lede: CZ CELLxGENE Discover Census is a free-to-use API-and-data service from the Chan Zuckerberg
      Initiative for querying its single-cell corpus at low latency in Python or R.
    text: 'The Census of CZ CELLxGENE Discover is a free-to-use service, both API and data, that lets
      researchers query its single-cell corpus at low latency directly from Python or R. Each Census build
      is a TileDB-SOMA collection paired with the source H5AD files behind it, named by a unique build
      tag, normally the build date such as 2023-05-15, across two release tracks: Long-Term Supported
      (LTS) and Weekly. The builds are publicly hosted in AWS S3 (us-west-2) and reachable anonymously
      at no cost, with the Census Python and R API the recommended access path and bulk download available
      through the AWS CLI. The data is available for re-use under CC-BY-4.0, with attribution to the original
      data contributors; the MIT license covers only the project''s code, not the data.'
  refs:
  - cellxgene-census-readme-license
  - cellxgene-census-aws-access

