summary:
  copy:
    headline: American Community Survey PUMS as queryable RDF linked data
    lede: The Linked ACS publishes the U.S. Census Bureau's American Community Survey Public Use Microdata
      Sample as RDF/Turtle linked data, built by data.world in partnership with the Census Bureau.
    text: 'The Linked ACS represents the U.S. Census Bureau''s American Community Survey (ACS) Public
      Use Microdata Sample (PUMS) — de-identified public-use records of people and housing units — using
      the Resource Description Framework (RDF), serialized as gzip-compressed Turtle (.ttl). Recasting
      the microdata as a graph assigns each element a URI, so records are queryable with SPARQL and can
      be joined or merged with any other linked dataset.


      The data is built around two core entity types, acs:Person and acs:Housing, each carrying a primary
      statistical weight (acs:hasPrimaryWeight) plus replicate weights for standard-error estimation.
      It is organized into raw transliterations of the Census CSVs, an enhanced/queryable representation
      split by record type, year, and state, the ACS ontology and geographic crosswalk files, and sample
      tabulation queries. The underlying Census PUMS data are a public-domain U.S. Government work; the
      linked-data layer published here is licensed CC BY 4.0 and updated yearly as new ACS 1-year PUMS
      releases.'
  refs:
  - dataworld-uscensus-docs
  - aws-registry-yaml

