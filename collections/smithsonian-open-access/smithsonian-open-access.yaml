- prefix: metadata/
  copy:
    headline: Catalog metadata for the Open Access corpus
    lede: Smithsonian catalog records describing the Open Access corpus, published from the EDAN content
      repository under CC0.
    text: Catalog records describing the Smithsonian Open Access corpus are published here, drawn from
      EDAN, the Smithsonian's content repository, and made available under metadata/edan/. The records
