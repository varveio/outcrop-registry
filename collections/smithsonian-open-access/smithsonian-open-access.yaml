- prefix: metadata/edan/
  copy:
    headline: Smithsonian catalog records, line-delimited JSON by unit
    lede: Over 11 million Smithsonian catalog records from EDAN, serialized as line-delimited JSON and
      grouped into one subdirectory per owning unit, released under CC0.
    text: 'More than 11 million Smithsonian catalog records, drawn from EDAN, are published here as line-delimited
      JSON. The records are grouped by owning unit — subdirectories named by internal Smithsonian acronym
      such as nmnh, npg, and saam — and, within a unit, distributed across files by the first two characters
      of each record''s content serialization hash. A directory listing is published at metadata/edan/index.txt.


      Each record carries the descriptive, structured metadata for an object, specimen, artwork, or archival
      item. Schema documentation is available at edan.si.edu/openaccess/docs/, and all records are dedicated
      to the public domain under CC0 1.0.'
  refs:
  - si-github-readme

- prefix: metadata/edan/nmnh/
  copy:
    headline: National Museum of Natural History EDAN records
    lede: Catalog records for the National Museum of Natural History (NMNH) from EDAN, serialized as line-delimited
      JSON and released under CC0.
    text: Line-delimited-JSON EDAN catalog records for the National Museum of Natural History are published
      here, identified in the README by the internal acronym NMNH. The README further enumerates NMNH
      departmental units — anthropology, botany, entomology, paleobiology, mineral sciences, invertebrate
      zoology, and the vertebrate-zoology divisions for birds, fishes, herpetology, and mammals — each
      carrying its own owning-unit code. All records are dedicated to the public domain under CC0 1.0.
  refs:
  - si-github-readme

