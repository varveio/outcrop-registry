    text: Digitized media files from the Smithsonian Open Access corpus are gathered here and grouped
      into per-unit subdirectories named by internal Smithsonian acronym — for example nmnh (National
      Museum of Natural History), npg (National Portrait Gallery), saam (Smithsonian American Art Museum),
