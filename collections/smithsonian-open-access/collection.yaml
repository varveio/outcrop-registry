summary:
  copy:
    headline: 'Smithsonian Open Access: 2.8M+ CC0 images and 11M+ catalog records'
    lede: Smithsonian Open Access releases over 2.8 million interdisciplinary 2-D and 3-D images and more
      than 11 million metadata records into the public domain under CC0, drawn from museums, archives,
      libraries, and research units across the Smithsonian Institution.
    text: 'Smithsonian Open Access publishes the Smithsonian Institution''s digitized collections as a
      single public-domain corpus: 2-D and 3-D images of objects, specimens, artworks, and archival items,
      together with the underlying EDAN catalog metadata. Released February 25, 2020, it comprises more
      than 2.8 million 2-D and 3-D images with related metadata and over 11 million metadata records spanning
      the institution''s art, history, natural-history, air-and-space, portraiture, design, and archival
      units.


      Everything carries a CC0 1.0 Universal dedication, relinquishing copyright so the assets can be
      downloaded, modified, reused, and redistributed for any purpose, including commercial use, without
      permission, attribution, or fee. The corpus is organized by owning Smithsonian unit, identified
      by internal acronyms such as NMNH, NPG, SAAM, NASM, and NMAAHC, and is mirrored to the public smithsonian-open-access
      S3 bucket in AWS us-west-2, where new and updated files are pushed weekly.'
  refs:
  - si-github-readme
  - si-aws-registry
  - si-license-cc0

