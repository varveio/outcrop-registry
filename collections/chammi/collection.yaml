summary:
  copy:
    headline: Channel-adaptive microscopy benchmark across heterogeneous-channel cell imaging
    lede: CHAMMI-75 is a 2.8-million-image collection of multi-channel single-cell microscopy curated
      from 75 public biological studies by the Morgridge Institute, built to train and evaluate channel-adaptive
      models that generalize across imaging modalities.
    text: CHAMMI grew from the NeurIPS 2023 "Channel-Adaptive Models in Microscopy Imaging" benchmark
      into CHAMMI-75, a large-scale resource for representation learning on images whose channel count
      and assay type vary from study to study. The pre-training set spans roughly 2.79 million fields-of-view
      drawn from 74 publicly available studies across 18 hosting platforms (including the Image Data Resource
      and Zenodo), so a single model can be trained on three-, four-, five- and higher-channel images
      at once. A held-out evaluation set pairs that training corpus with six benchmark domains that probe
      generalization to novel channel combinations and tasks, from protein localization to red-blood-cell
      morphology and compound screening. The collection is curated and distributed by the Caicedo Lab
      at the Morgridge Institute for Research; 97% of the contributing studies carry Creative Commons
      licenses and the aggregate release is published under CC BY 4.0.
