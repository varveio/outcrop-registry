summary:
  copy:
    headline: GLS least-squares estimates and standard deviations for 2020 redistricting counts
    lede: The 2020 Redistricting Data File Least Squares Estimates, published by the U.S. Census Bureau,
      give generalized-least-squares count estimates and their standard deviations for the persons-universe
      tabulations of the 2020 P.L. 94-171 redistricting data.
    text: This data product re-estimates every persons-universe tabulation that appeared in the 2020 Census
      Redistricting Data File (P.L. 94-171), pairing each count with a standard deviation so that confidence
      intervals can be derived for the published counts. The estimates are produced by a generalized least
      squares (GLS) estimator run over the publicly released 2020 Census noisy measurement files for both
      the Redistricting Data File and the Demographic and Housing Characteristics File — the noisy outputs
      of the Census Bureau Disclosure Avoidance System. Their purpose is to quantify the uncertainty introduced
      by disclosure avoidance alone (not enumeration or other error sources). Tables are released as CSV
      partitioned by geography, covering the US, state, county, and tract levels.
  refs:
  - gls-registry-metadata
  - gls-readme

