summary:
  copy:
    headline: Lunar topography as analysis-ready point clouds
    lede: An analysis-ready release of the Lunar Orbiter Laser Altimeter (LOLA) record, published by USGS
      Astrogeology as Cloud Optimized Point Clouds of the Moon's surface under CC0.
    text: The Lunar Orbiter Laser Altimeter, aboard NASA's Lunar Reconnaissance Orbiter, has returned
      more than 6.3 billion individual laser-altimetry shots of the lunar surface between July 2009 and
      February 2023. This release reformats those LOLA Reduced Data Record spot observations into ASPRS
      LAZ / Cloud Optimized Point Cloud (COPC) files for direct cloud query and analysis. Returns are
      organized into 15-degree by 15-degree longitude/latitude tiles, each carrying latitude, longitude,
      and radius coordinates in the IAU 2015 lunar reference frame, and the tiles are indexed by a SpatioTemporal
      Asset Catalog (STAC) collection so they can be queried by region with PDAL and STAC clients. Produced
      by the USGS Astrogeology Science Center (Laura and Hare, 2023; DOI 10.5066/P9V5JIWH) and released
      under CC0 1.0.
