summary:
  copy:
    headline: Satellite-derived solar irradiance and meteorological record for the U.S. and a growing
      list of international regions
    lede: The National Solar Radiation Database (NSRDB), published by NREL for the U.S. Department of
      Energy, is a serially complete record of solar irradiance and meteorology covering the United States
      and a growing list of international locations from 1998.
    text: 'The NSRDB is a serially complete collection of meteorological and solar irradiance data for
      the United States and a growing list of international locations from 1998 onward, updated annually
      by the National Renewable Energy Laboratory to support DOE programs, research, industry, and the
      general public. The solar radiation values represent the resource available to solar energy systems.


      The baseline record provides time-series data at 30-minute resolution averaged over surface cells
      of 0.038 degrees in latitude and longitude, nominally 4 km. Higher-cadence data at 5-minute resolution
      for the U.S. and 10-minute resolution for North, Central, and South America at 2 km is produced
      from the next generation of GOES satellites and available from 2019.'
  refs:
