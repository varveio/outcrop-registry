summary:
  copy:
    headline: Web-scale parallel corpora to and from English for EU languages
    lede: ParaCrawl is a set of large parallel corpora to and from English for every official EU language,
      harvested from multilingual websites and released under CC0.
    text: 'ParaCrawl built parallel corpora by crawling the web for translated text, running an automated
      pipeline (Bitextor) across the full chain from identifying multilingual sites to collecting, cleaning,
      and delivering bitexts as training data for CEF.AT and translation memories for DG Translation.
      It ran as a Connecting Europe Facility action coordinated by Philipp Koehn at Johns Hopkins University,
      with partners including the University of Edinburgh, the University of Alicante, TAUS, Prompsit,
      and Omniscien Technologies, and co-financed by the European Union.


      Releases span v1.0 (January 2018) through v9 (September 2021, the final release for Action 3), alongside
      bonus corpora for further and low-resource language pairs and large monolingual datasets from the
      same pipeline. ParaCrawl dedicates the packaging of this data under Creative Commons CC0 while disclaiming
      ownership of the underlying source text. The corpora are also mirrored on OPUS and on the AWS Registry
      of Open Data (s3://web-language-models).'
  refs:
