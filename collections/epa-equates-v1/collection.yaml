summary:
  copy:
    headline: CMAQ-modeled gridded air quality from EPA's EQUATES project
    lede: EPA's Air QUAlity TimE Series (EQUATES) project provides Community Multiscale Air Quality (CMAQ)
      v5.3.2 model output as hourly gridded pollutant fields over the contiguous U.S. and the Northern
      Hemisphere.
    text: 'EQUATES is the U.S. Environmental Protection Agency''s multi-year air-quality modeling effort,
      pairing WRF meteorology with the CMAQ photochemical model (version 5.3.2) to produce a consistent
      record of pollutant concentrations and deposition. This collection holds the CMAQ output as compressed
      netCDF/HDF5 files in I/O API data structures, organized by modeling domain: ''12US1'', the conterminous
      U.S. (including parts of Canada and Mexico) at 12 km grid spacing, and ''108NHEMI'', the Northern
      Hemisphere at 108 km grid spacing. For each domain the output is split into vertical COLUMN totals
      (integrated species columns such as NO2, O3, HCHO and aerosol optical depth) and 3D CONC3D fields
      (hourly per-layer concentrations across dozens of species). The data are processed COMBINE products
      intended for human-health, ecological, model-evaluation and model-development applications, distributed
      through the CMAS Data Warehouse and the AWS Open Data Sponsorship Program.'
  refs:
  - epa-equates-aws-registry
  - epa-equates-data-dictionary

