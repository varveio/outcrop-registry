summary:
  copy:
    headline: Molecular-dynamics conformational ensembles of every short peptide
    lede: The Conformational Space of Short Peptides is an exhaustive set of Amber molecular-dynamics
      simulations sampling the conformations of all tripeptides and pentapeptides built from the 20 common
      amino acids.
    text: 'Co-managed by Toyoko and the Structural Biology Group at the Universidad Nacional de Quilmes
      (UNQ), this collection maps the conformational space accessible to short peptides by running exhaustive
      molecular-dynamics simulations in Amber. It samples a representative subset of the structural conformations
      available to every possible peptide of the chosen length, built from the 20 common amino acids.


      The data is organized into two products: tripeptide simulations (all 8,000 possible tripeptides,
      two replicas each, kept as individual Amber output, trajectory and coordinate files) and pentapeptide
      simulations (all 3,200,000 possible pentapeptides, packaged one run per bzip2-compressed tarball).
      It supports work on the structural constraints of peptide binding — for instance, using a tripeptide
      bound in the DPP-IV pocket as a docking template to screen alternative tripeptides as candidate
      inhibitors. Released under CC BY 4.0.'
