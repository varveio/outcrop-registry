summary:
  copy:
    headline: Multi-season robot-navigation dataset from a Québec boreal forest
    lede: FoMo is a year-long, multi-sensor robot-navigation dataset recorded by Norlab (Université Laval)
      in Forêt Montmorency, a boreal forest 80 km north of Québec City.
    text: 'FoMo captures repeated robotic traversals of six trajectories — over 64 km in total — driven
      across twelve deployments spanning a full year, from −19 °C winters under more than a metre of snow
      to warm summers with dense vegetation. An uncrewed ground vehicle carries a synchronized multi-modal
      sensor suite: two lidars (one rotating, one hybrid solid-state), an FMCW radar, stereo and monocular
      cameras, dual IMUs, microphones, wheel odometry, power telemetry, and GNSS, with centimetre-accurate
      ground-truth trajectories from post-processed GNSS-PPK fusion and one-minute weather-station metadata.
      It is built to stress long-term SLAM, odometry, localization, and traversability methods against
      the seasonal change that degrades state-of-the-art re-localization. Published by Norlab, Université
      Laval under CC BY 4.0 and distributed openly on AWS as the s3://fomo-dataset bucket; the paper is
      arXiv:2603.08433.'
