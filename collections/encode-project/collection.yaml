summary:
  copy:
    headline: Functional-element parts list of the human and mouse genomes
    lede: The Encyclopedia of DNA Elements (ENCODE) is an NHGRI-funded consortium cataloguing functional
      elements across the human and mouse genomes, with every released and archived file mirrored to s3://encode-public
      by the ENCODE Data Coordinating Center.
    text: 'The Encyclopedia of DNA Elements (ENCODE) builds a comprehensive parts list of functional elements
      in the human and mouse genomes, served by the ENCODE Data Coordinating Center at Stanford University.
      Like the Human Genome Project, the consortium seeks rapid dissemination: all data is available for
      unrestricted use immediately upon release to public databases, with no moratorium. The s3://encode-public
      bucket is the publicly readable cloud mirror, in us-west-2 and reachable without an AWS account,
      where the Data Coordinating Center publishes every released and archived file. Each file record
      on the ENCODE portal links its cloud_metadata directly to the matching S3 object. ENCODE requests,
      but does not require, that researchers cite the consortium and reference accession numbers when
      they use the data.'
