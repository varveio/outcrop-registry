prefixes:
- prefix: '*/'
  copy:
    headline: Submission-date partitions of the ENCODE file corpus
    lede: The bucket's top-level YYYY/, YYYY/MM/, and YYYY/MM/DD/ prefixes partition every ENCODE file
      by its submission date rather than by assay, experiment, or biosample.
    text: 'Each ENCODE file object is keyed as YYYY/MM/DD/<uuid>/<accession>, where the leading segments
      are the file''s submission date and the rest is a per-file UUID directory holding the accession-named
      object. This holds across years on the portal: ENCFF002COS (created 2014-06-06) resolves under 2014/06/06/,
      ENCFF000VWQ (2012-07-01) under 2012/07/01/, and ENCFF001MXE (2010-04-26) under 2010/04/26/. Because
      the layout follows ingestion dates, the year prefixes and their month and day children partition
      one corpus chronologically rather than grouping browseable per-assay datasets: the files for any
      given assay, biosample, or experiment scatter across whatever dates they were submitted. Users locate
      data through the ENCODE portal and REST API by accession, experiment, assay, biosample, or file
      type, then follow each file''s cloud_metadata to its object under the appropriate date prefix.'
  refs:
  - encode-s3-layout

