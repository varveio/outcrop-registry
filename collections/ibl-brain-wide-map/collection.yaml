summary:
  copy:
    headline: Whole-brain Neuropixels activity map of mouse decision-making
    lede: The IBL Brain Wide Map pools Neuropixels electrophysiology across twelve laboratories into a
      brain-wide activity map recorded while mice perform a single standardized decision-making task.
    text: The International Brain Laboratory built the Brain Wide Map to understand the neural basis of
      decision-making in the mouse, systematically recording from nearly all major brain areas with Neuropixels
      probes on an unbiased sampling grid and replicating each recording site in at least two laboratories.
      The result is a map of activity at single-spike cellular resolution during the IBL decision-making
      task. The release spans 459 Neuropixel sessions and 699 probe insertions from 139 mice across 12
      laboratories, covering 241 brain regions and yielding 621,733 spike-sorted units, 75,708 of them
      good quality. Beyond the spike data it captures the sensory stimuli presented to the mouse, the
      mouse's choices and response times, and pose information from video via DeepLabCut. Data follow
      the standard IBL data structure.
  refs:
  - ibl-bwm-release-doc

