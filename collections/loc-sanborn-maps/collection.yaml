summary:
  copy:
    headline: Digitized Sanborn fire-insurance maps of U.S. cities
    lede: The Library of Congress Sanborn Maps Data Package assembles metadata and JPEG images for the
      largest extant collection of Sanborn fire-insurance maps, digitized and released as an open data
      package.
    text: The Sanborn Fire Insurance Maps are large-scale, detailed plans of U.S. cities and towns drawn
      by the Sanborn Map Company to assess fire-insurance risk, recording building footprints, construction
      materials, addresses, and land use street by street. The Library of Congress holds the largest surviving
      collection. This data package, produced by LC Labs, packages metadata records for 50,600 maps and
      their 440,048 corresponding JPEG images for cloud-scale use. Records are provided as metadata.json,
      line-delimited metadata.jsonl, and a CSV transformation at the package root, alongside the images
      themselves partitioned by state. The package also includes a small sample subset for testing and
      CSV/PNG summaries of holdings. The digitized content is in the public domain (atlases published
      before 1923 or whose copyright was not renewed — roughly 69% of the collection).
