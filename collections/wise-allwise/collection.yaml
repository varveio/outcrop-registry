summary:
  copy:
    headline: AllWISE all-sky mid-infrared source catalog and image atlas
    lede: The AllWISE Data Release is NASA's combined Wide-field Infrared Survey Explorer release, cataloging
      over 747 million sources across the full mid-infrared sky.
    text: The AllWISE Data Release combines observations from the WISE cryogenic and NEOWISE post-cryogenic
      survey phases into the most comprehensive view of the full mid-infrared sky to date. Its Source
      Catalog records accurate positions, apparent-motion measurements, four-band fluxes (3.4, 4.6, 12
      and 22 microns) and flux-variability statistics for over 747 million objects detected on the deep
      coadded Atlas Images; exploiting the 6-to-12-month baseline between WISE sky-coverage epochs let
      AllWISE measure source motions and improved variability for the first time. The companion Images
      Atlas provides 18,240 four-band calibrated 1.56-degree FITS image sets with depth-of-coverage and
      noise maps, coadded from nearly 7.9 million single-exposure frames. The release is stewarded by
      the NASA/IPAC Infrared Science Archive (IRSA) at Caltech/JPL and mirrored to AWS S3 under the Open
      Data program.
  refs:
  - wise-allwise-release

