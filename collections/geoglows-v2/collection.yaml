summary:
  copy:
    headline: 'Global hydrologic model: streamflow back to 1940 plus daily forecasts'
    lede: GEOGLOWS Hydrological Model Version 2 is a global-scale river model that publishes historical
      streamflow back to 1940 and daily 15-day forecasts, alongside the supporting hydrography.
    text: 'GEOGLOWS — the Group on Earth Observations Global Water Sustainability Program — runs a global-scale
      hydrologic model offering daily forecasted streamflow and historical streamflow back to 1940. The
      catalog spans three strands: a retrospective record of river discharge (hourly, daily, monthly,
      and yearly Zarr time series, plus yearly maximums, return periods, and flow duration curves); daily
      15-day forecasts generated every day at midnight as a 51-member ECMWF IFS ensemble in Zarr; and
      the supporting hydrography of stream and catchment locations worldwide, including a global hydrography
      product and supplementary Parquet tables.'
  refs:
