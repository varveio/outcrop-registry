- prefix: 2019/ALB/
  copy:
    headline: FY2019 airborne laser bathymetry, southeast Mt. Fuji and eastern Izu
    lede: Airborne laser bathymetry (ALB) point clouds acquired in FY2019 over the southeastern Mt. Fuji
      area and the eastern Izu Peninsula of Shizuoka Prefecture.
    text: The FY2019 airborne laser bathymetry survey captures shallow-water and coastal terrain across
      southeast Mt. Fuji and the eastern Izu Peninsula, complementing the topographic laser scans. The
      release carries Ground point clouds plus the derived Ortho, Contour, and Grid products, tiled to
      the National Basic Map Grid (zone 08) and distributed as zipped LAS (with DXF contours and TIFF
      orthophotos).
  refs:
  - vshizuoka-readme

