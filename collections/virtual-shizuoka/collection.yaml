summary:
  copy:
    headline: Open 3D point cloud of Shizuoka Prefecture, Japan
    lede: Virtual Shizuoka is a prefecture-wide open point-cloud archive that recreates Shizuoka, Japan
      at 1:1 scale from laser-survey data, published by AIGID under CC-BY 4.0 / ODbL.
    text: 'Virtual Shizuoka collects high-precision 3D point clouds measured across the whole of Shizuoka
      Prefecture using airborne laser scanning, airborne laser bathymetry, and mobile mapping systems,
      with the aim of building a digital-twin replica of the prefecture for disaster prevention, infrastructure
      maintenance, autonomous driving, and tourism. Each point carries XYZ coordinates plus color and
      classification, georeferenced to EPSG:6676 (JGD2011 Japan Plane Rectangular CS VIII).


      The archive is organized by fiscal year of acquisition (2019-2025), then by survey method (LP airborne
      laser, MMS mobile mapping, ALB airborne laser bathymetry, and Backpack mobile mapping) and product
      type (Ground/Original point clouds, Grid elevation, Contour, and Ortho imagery). Coverage was acquired
      area-by-area over successive years, beginning with the Mt. Fuji and Izu Peninsula regions. Files
      are tiled to the National Basic Map Grid (level-500 sections) under zone 08, distributed as LAS
      point clouds (DXF for contours, TIFF for orthophotos) compressed as ZIP or 7z.'
