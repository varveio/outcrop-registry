summary:
  copy:
    headline: High-resolution digital surface model of the Arctic
    lede: ArcticDEM is a 2-meter digital surface model of the Arctic, produced by the Polar Geospatial
      Center at the University of Minnesota under an NGA-NSF initiative.
    text: 'ArcticDEM is an NGA-NSF public-private initiative that automatically produces a high-resolution
      digital surface model of the Arctic from optical stereo imagery, high-performance computing, and
      open-source photogrammetry software. The Polar Geospatial Center (PGC) at the University of Minnesota
      produces it under NSF-OPP awards, drawing on Vantor''s historical archive of WorldView-1, WorldView-2,
      and WorldView-3 imagery.


      The data comes in two product types: time-dependent DEM strips at their native temporal resolution,
      and seamless terrain mosaics synthesized from the full stack of overlapping strips. The polar datasets
      together span over 20 trillion 2-by-2 meter elevation cells across 20 million square kilometers.


      ArcticDEM is published under CC-BY-4.0 and may be used, distributed, and modified without permission,
      with one exception: Alaska data from June 2022 onward is withheld under EOCL restrictions.'
