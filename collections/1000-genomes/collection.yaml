summary:
  copy:
    headline: Open catalogue of human genetic variation across 26 populations
    lede: The 1000 Genomes Project, maintained as the International Genome Sample Resource (IGSR) by EMBL-EBI,
      is an openly consented catalogue of human genetic variation built from samples spanning 26 worldwide
      populations.
    text: The 1000 Genomes Project created a catalogue of common human genetic variation — SNPs, indels
      and structural variants with their haplotype context — from openly consented samples donated by
      people who declared themselves healthy. IGSR was established at EMBL-EBI to keep that data usable,
      to update it to the current reference assembly, and to extend it with newer sequencing of the same
      samples and data from other openly consented projects such as the Human Genome Structural Variation
      Consortium. The resource brings together the project's original low-coverage, exome and high-coverage
      data alongside these later additions, all under an unusually open consent that lets the data be
      fully publicly accessible and shared freely; variants can also be viewed in genomic context in Ensembl.
      1000 Genomes data is now available without embargo following the project's final publication. Because
      IGSR carries data from many different owners, restrictions and claimed rights vary between and within
      subsets and can change over time, so users should consult the data reuse statement accompanying
      each collection.
  refs:
  - igsr-homepage
  - igsr-disclaimer-colbuk

