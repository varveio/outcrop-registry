schema_version: '0.4'
bucket: 1000genomes
backend: s3
role: primary
region: us-east-1

prefixes:
- prefix: 1000G_2504_high_coverage/
  copy:
    headline: 30x high-coverage re-sequencing of the expanded 3,202-sample cohort
    lede: This is the New York Genome Center's 30x high-coverage re-sequencing of the 1000 Genomes cohort
      — the 2,504 unrelated phase 3 panel plus 698 related samples — aligned to GRCh38 as CRAMs.
    text: This contains the high-coverage (30x) re-sequencing of the 1000 Genomes Project samples by the
      New York Genome Center (NYGC), funded by NHGRI. It covers the 2,504 unrelated samples that made
      up the project's third and final phase panel, plus an additional 698 related samples, bringing the
      total sequenced to high-coverage by NYGC to 3,202. NYGC aligned the data to the GRCh38 reference
      assembly and shared the resulting CRAMs, which are listed in the IGSR data portal and accessible
      from FTP sites hosted by EMBL-EBI and NCBI as well as on AWS and AnVIL. Across the expanded cohort,
      SNV and short indel discovery was performed and a comprehensive set of structural variants was generated
      by integrating multiple analytic methods. The high-coverage resource underpins later imputation
      reference panels and is distributed alongside the original phase 3 low-coverage data, so the same
      individuals are available both as the historical project alignments and as modern 30x GRCh38 CRAMs.
  refs:
  - 30x-nygc

- prefix: alignment_indices/
  copy:
    headline: Alignment-file index manifests
    lede: Alignment index manifests — the alignment.index files that enumerate the project's available
      alignment files.
    text: The project's alignment index manifests. alignment.index files enumerate the available alignment
      files across the project; the BAM/CRAM alignments they catalogue are held in the project's alignment
      directories.
  refs:
  - alnidx-dacc

- prefix: changelog_details/
  copy:
    headline: No external documentation found for this folder
    text: The cited source describes only that the project's data is organised by type, which does not
      document this folder specifically.
  refs:
  - changelog-dacc

- prefix: complete_genomics_indices/
  copy:
    headline: No external documentation found for this folder
    text: The cited source describes only that the project's data is organised by type, which does not
      document this folder specifically.
  refs:
  - cgidx-dacc

- prefix: data/
  copy:
    headline: Per-individual sequence reads and alignments
    lede: 'The project''s sequence and alignment data: raw FASTQ reads organised by individual and their
      BAM/CRAM alignments.'
    text: 'The project''s primary sequence and alignment data, organised by individual: raw FASTQ sequence
      files per individual, with BAM/CRAM alignments. These reads and alignments are the underlying basis
      for the integrated variant call sets.'
  refs:
  - data-dacc

- prefix: hgsv_sv_discovery/
  copy:
    headline: HGSVC structural-variation discovery data
    lede: Human Genome Structural Variation Consortium (HGSVC) data, building a high-quality catalogue
      of structural variation using various sequencing approaches.
    text: 'Data associated with the Human Genome Structural Variation Consortium (HGSVC), assembled to
      create a high-quality catalogue of structural variation using various sequencing approaches. Continuing
      the philosophy of the 1000 Genomes Project, the data producers release the data prior to publication
      in line with Fort Lauderdale principles: users may use the data for many studies but are expected
      to let the producers make the first presentations and publish the first paper with global analyses.
      The project plans global analyses of sequence quality, structural variants, STRs and microsatellites,
      haplotypes and LD patterns, and regions of general interest such as HLA. Consult the accompanying
      data reuse statement before use.'
  refs:
  - hgsvc

- prefix: phase1/
  copy:
    headline: Phase 1 — the first integrated 1000 Genomes call set
    lede: Phase 1 produced the project's first integrated variant calls — bi-allelic SNP and indel calls
      with genotype dosages — for 1,092 individuals mapped to GRCh37.
    text: Phase 1 contains the project's first integrated variant calls, covering 1,092 individuals mapped
      to GRCh37. The calls are bi-allelic SNP and indel calls and include LDAF and genotype-dosage values
      produced by Mach/Thunder imputation-based refinement. It followed the project's pilot studies and
      preceded the more comprehensive phase 3 release.
  refs:
  - phase1-dacc

- prefix: phase1/analysis_results/ancestry_deconvolution/
  copy:
    headline: Phase 1 ancestry deconvolution
    lede: Per-population ancestry deconvolution for the ASW, CLM, MXL and PUR phase 1 populations, with
      global-proportion files.
    text: Per-population ancestry deconvolution archives for ASW, CLM, MXL and PUR, along with global-proportion
      text files, documented by a README dated 20120604.
  refs:
  - int-p1ancestry

- prefix: phase1/analysis_results/consensus_call_sets/
  copy:
    headline: Phase 1 consensus call sets by variant type
    lede: The phase 1 consensus call sets, organised into SNP, indel and structural-variant subfolders.
    text: The phase 1 consensus call sets, grouped by variant type into snps/, indels/ and sv/ subfolders,
      documented by a README dated 20120620.
  refs:
  - int-p1consensus

- prefix: phase1/analysis_results/experimental_validation/
  copy:
    headline: Phase 1 experimental validation
    lede: Phase 1 experimental validation data, organised by variant type.
    text: The phase 1 experimental validation results, grouped into snps/, indels/ and sv/ subfolders,
      documented by a README dated 20120620.
  refs:
  - int-p1expval

- prefix: phase1/analysis_results/functional_annotation/
  copy:
    headline: Functional annotation of phase 1 variants
    lede: The phase 1 functional annotation, split into annotated VCFs and annotation sets.
    text: The phase 1 functional annotation, organised into annotated_vcfs/ and annotation_sets/, documented
      by a README dated 20120621.
  refs:
  - int-p1funcanno

- prefix: phase1/analysis_results/input_call_sets/
  copy:
    headline: Phase 1 input call sets
    lede: 'The per-method input call sets fed into phase 1 integration: exome and whole-genome SNP, indel
      and deletion sites.'
    text: 'The phase 1 input call sets: exome SNP call sets (Illumina/WCMC/BCM and SOLiD/BCM), the whole-genome
      union VQSR2b low-coverage SNP set, the union of annotated and filtered low-coverage indels, and
      the merged 5-way low-coverage deletion calls, documented by a README dated 20120621.'
  refs:
  - int-p1input

- prefix: phase1/analysis_results/integrated_call_sets/
  copy:
    headline: Phase 1 v3 integrated call set
    lede: 'This is the phase 1 v3 integrated call set: integrated SNP, indel and structural-variant genotypes
      for the phase 1 samples on the 20101123 freeze.'
    text: The phase 1 v3 integrated call set, combining SNPs, indels and structural variants with per-sample
      genotypes, dated to the 20101123 freeze. It provides per-chromosome integrated genotype VCFs, a
      whole-genome sites VCF, and the sample panel and pedigree files identifying the phase 1 samples
      and family structure.
  refs:
  - int-p1ics

- prefix: phase1/analysis_results/paper/
  copy:
    headline: Phase 1 publication and integrative annotation
    lede: The phase 1 Nature paper (nature11632) and its supplement, with integrative annotation data.
    text: The phase 1 paper 1000genomes_phase1_nature11632.pdf and its supplementary PDF, alongside an
      integrative_annotation/ subfolder.
  refs:
  - int-p1paper

- prefix: phase1/analysis_results/shapeit2_phased_haplotypes/
  copy:
    headline: Phase 1 SHAPEIT2 phased haplotypes
    lede: These are SHAPEIT2-phased haplotypes for 1,092 phase 1 samples, covering over 36 million SNPs
      and 1.3 million indels and structural variations.
    text: These haplotypes were phased using a new version of SHAPEIT2 that can combine genotype likelihoods
      with genotypes from SNP microarrays on the same samples. Covering 1,092 samples across over 36 million
      SNPs and 1.3 million indels and structural variations, they achieve lower genotype discordance and
      improved imputation performance into downstream GWAS samples, especially at low frequency.
  refs:
  - int-p1shapeit

- prefix: phase1/analysis_results/supporting/
  copy:
    headline: Supporting files for the phase 1 analysis results
    lede: Supporting files for the phase 1 analysis, spanning genome masks, ancestral alignments, variant
      scores, and related resources.
    text: Supporting files accompanying the phase 1 analysis results, documented by a 2012 README. Organised
      into subfolders covering accessible genome masks, ancestral alignments, axiom genotypes, COSMIC/HGMD
      overlap, cryptic relation analysis, excluded indel sites, exome pull-down, highly differentiated
      sites, omni haplotypes, and variant GERP scores.
  note: The phase1/analysis_results/supporting tree contains supplementary files (genome masks, ancestral
    alignments, variant scores) that accompany the phase 1 analysis results publication — they are an
    integral sub-tree of the phase 1 analysis_results product, not a separately cataloged dataset, and
    the project's data page describes such files as 'intermediate and working data as well as analysis
    files described in publications.'
  refs:
  - 1000g-phase1-supporting-readme
  boundary: pin

- prefix: phase3/
  copy:
    headline: Phase 3 — the project's final integrated variant release
    lede: 'Phase 3 is the 1000 Genomes Project''s final, most comprehensive release: an integrated set
      of phased haplotypes with more than 80 million variants for 2,504 individuals from 26 populations.'
    text: 'Phase 3 contains the project''s final integrated release: phased haplotypes spanning more than
      80 million variants — multi-allelic SNPs, indels and a diverse set of structural variants — for
      2,504 individuals from 26 populations. Alignments were produced on GRCh37, with a subsequent re-alignment
      to GRCh38 that incorporates decoy sequence, alternative haplotypes and EBV. It is the most comprehensive
      of the project''s three staged releases, following the pilot studies and the phase 1 call set.'
  refs:
  - phase3-dacc

- prefix: phase3/integrated_sv_map/
  copy:
    headline: Phase 3 integrated structural-variation map
    lede: This is the phase 3 integrated map of 68,818 structural variants across 2,504 individuals from
      26 populations.
    text: This integrated map contains 68,818 structural variants across 2,504 individuals from 26 populations,
      including 40,975 deletions, 6,025 duplications, 786 inversions, 2,929 multi-allelic CNVs, and mobile
      element insertions (12,748 ALU, 3,048 LINE1, 835 SVA). Large deletions were genotyped using Beagle
      and phased with the SHAPEIT2 method, and MVNCall was used to add the other structural-variant classes.
  refs:
  - int-svmap

- prefix: pilot_data/
  copy:
    headline: Pilot data — the project's three method-development pilots
    lede: The 1000 Genomes Project's three pilot studies — a low-coverage whole-genome study, a high-coverage
      trio study, and an exon-targeted study — all mapped to NCBI build 36.
    text: 'The pilot data covers the project''s three pilot studies: a low-coverage whole-genome study
      of 179 individuals, a high-coverage study of two trios, and an exon-targeted study of nearly 700
      individuals. All pilot data was mapped to the NCBI build 36 reference assembly, predating the GRCh37
      alignments used from phase 1 onward.'
  refs:
  - pilot-dacc

