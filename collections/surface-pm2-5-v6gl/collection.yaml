summary:
  copy:
    headline: Satellite-derived global surface PM2.5 estimates (V6.GL.03)
    lede: SatPM2.5 V6.GL.03 is the Atmospheric Composition Analysis Group's most state-of-the-science
      global estimate of ground-level fine particulate matter, gridded monthly and annually for 1998-2024.
    text: 'SatPM2.5 V6.GL.03 estimates ground-level fine particulate matter (PM2.5) concentrations worldwide
      by fusing satellite aerosol optical depth retrievals (Dark Target, Deep Blue, and MAIAC) from NASA
      instruments aboard MODIS/Terra, MODIS/Aqua, MISR/Terra, SeaWiFS/SeaStar, VIIRS/SNPP, and VIIRS/NOAA20
      with the GEOS-Chem chemical transport model, then calibrating the geophysical estimate to global
      ground-based observations with a residual Convolutional Neural Network. Produced by the Atmospheric
      Composition Analysis Group at Washington University in St. Louis, V6.GL.03 covers 1998-2024 and
      is provided as gridded monthly and annual mean PM2.5 fields in NetCDF, in two spatial resolutions:
      a fine 0.01 deg grid and a coarse 0.1 deg grid (WGS84). The estimates are intended primarily for
      large-scale studies. The data is released under CC BY 4.0 and cited to Shen et al. (2024, ACS ES&T
      Air).'
  refs:
  - satpm-v6gl03-doc
  - satpm-homepage

