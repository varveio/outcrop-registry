summary:
  copy:
    headline: NOAA GFS forecasts and best-estimate analysis, cloud-optimized
    lede: dynamical.org's analysis-ready republication of NOAA's Global Forecast System (GFS), serving
      global 0.25° forecasts and an hourly best-estimate analysis as one-line-loadable Icechunk/Zarr stores.
    text: 'dynamical.org reprocesses output from NOAA NWS/NCEP''s Global Forecast System (GFS) — a coupled
      atmosphere, ocean, land/soil, and sea-ice model producing dozens of atmospheric and land-soil variables
      — into analysis-ready, cloud-optimized Icechunk/Zarr datasets. Two products are built from the same
      global 0.25° (~20km) model output covering 2021-05-01 onward: a forecast archive (runs initialized
      every 6 hours, indexed by init_time and stepping along lead_time to 16 days) and an analysis archive
      (an hourly best estimate of past weather formed by concatenating the first hours of each successive
      forecast along a single time dimension). Source GRIB files come from NOAA Open Data Dissemination
      via the AWS Open Data Registry, with operational data from NOAA NOMADS; values are bit-rounded for
      compression. Both datasets open in one line via the open-source dynamical_catalog Python package,
      are stored with Source Cooperative (a Radiant Earth initiative) and AWS Open Data, and are licensed
      under CC BY 4.0.'
  refs:
  - gfs-forecast-page
  - gfs-analysis-page

