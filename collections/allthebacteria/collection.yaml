summary:
  copy:
    headline: Uniform reanalysis of every public bacterial genome assembly
    lede: AllTheBacteria is an open reanalysis of all public bacterial isolate sequencing data, uniformly
      assembled, QC-ed and searchable, published by the Iqbal lab and EMBL-EBI under CC-BY-4.0.
    text: AllTheBacteria takes all whole-genome-sequenced bacterial and archaeal isolate data from the
      public INSDC archives and re-processes it through a single uniform assembly, quality-control and
      annotation pipeline, so that millions of genomes can be compared on equal footing. It extends the
      2021 Blackwell et al. 661k-genome release, growing across successive releases (0.2, the 2024-08
      increment and the 2025-05 increment) to more than 2.7 million assemblies up to date with INSDC data
      through August 2024. The collection spans the per-sample FASTA assemblies, their metadata and weekly
      file lists, and prebuilt search indexes including a LexicMap nucleotide-alignment index over the
      assemblies. Data are hosted on AWS Open Data (eu-west-2), OSF and ENA, openly accessible without
      credentials, and released under CC-BY Attribution 4.0 International.
  refs:
