summary:
  copy:
    headline: Large-scale Japanese web-text corpus preprocessed from Common Crawl
    lede: ABEJA CC JA is a large Japanese-language training corpus that ABEJA, Inc. extracted and cleaned
      from Common Crawl, distributed as JSONL on AWS Open Data.
    text: ABEJA CC JA is a Japanese-language corpus built by ABEJA, Inc. from Common Crawl web archives
      for large-language-model pretraining, developed under a NEDO-funded LLM project. Each record pairs
      a source url with preprocessed Japanese content, stored as JSON-Lines. The pipeline screens for
      Japanese, extracts page text, applies language and quality filtering, deduplicates with MinHash,
      and removes advertisements, boilerplate, and harmful or personal-information-bearing lines. The
      public release is hosted in the ap-northeast-1 S3 bucket and made available for anyone to use under
      the Common Crawl Terms of Use.
