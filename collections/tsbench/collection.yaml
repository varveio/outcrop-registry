summary:
  copy:
    headline: Benchmark evaluations of 13 time-series forecasting methods across 44 datasets
    lede: TSBench is an AWS Labs benchmark that scores 13 GluonTS forecasting methods on 44 heterogeneous
      datasets, publishing both summary metrics and the full probabilistic forecasts.
    text: 'TSBench is a large-scale benchmark of time-series forecasting, produced by the GluonTS team
      at AWS Labs and detailed in ''Multi-Objective Model Selection for Time Series Forecasting'' (Borchert
      et al., arXiv:2202.08485). It evaluates 13 forecasting methods, spanning both classical statistical
      models and deep-learning approaches with multiple hyperparameter settings, against 44 publicly available
      datasets. For each run it records accuracy, latency, and model-size metrics, and retains the underlying
      probabilistic forecasts so results can be re-scored.


      The tabular metrics are compact (around 10 MiB), while the retained forecasts run to roughly 600
      GiB across thousands of training runs. The full collection is published as a public-read S3 bucket
      through the Registry of Open Data on AWS under CC BY 4.0.'
  refs:
  - tsbench-readme
  - tsbench-registry-yaml

