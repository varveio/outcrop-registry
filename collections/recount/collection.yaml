summary:
  copy:
    headline: Uniformly processed RNA-seq counts for human and mouse
    lede: recount3 is the ReCount project's resource of uniformly processed RNA-seq gene, exon, and exon-exon
      junction counts plus coverage bigWig files for thousands of public human and mouse studies, built
      by the Langmead Lab and the Lieber Institute for Brain Development.
    text: recount3 reprocesses public human and mouse RNA-seq studies through one consistent pipeline
      so that expression and splicing summaries stay comparable across studies and organisms. For each
      study it provides gene, exon, and exon-exon junction counts together with coverage bigWig files,
      with samples grouped by study and drawn from sources including the Sequence Read Archive (SRA),
      GTEx, and TCGA. Large studies such as GTEx and TCGA are fragmented at the tissue level to keep the
      data accessible. recount3 is the latest iteration of the ReCount family, and its coverage bigWig
      and exon-exon junction files power the wider ecosystem consumed through the recount3 and snapcount
      R/Bioconductor packages.
  refs:
  - recount3-docs-index

