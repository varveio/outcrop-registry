  label: 'recount3: summaries and queries for large-scale RNA-seq expression and splicing — Genome Biology
    (recount authors, open-access full text)'
  excerpt: We present recount3, a resource consisting of over 750,000 publicly available human and mouse
    RNA sequencing (RNA-seq) samples uniformly processed by our new Monorail analysis pipeline. To facilitate
    access to the data, we provide the recount3 and snapcount R/Bioconductor packages as well as complementary
    web resources. Using these tools, data can be downloaded as study-level summaries. recount3 is available
    from http://rna.recount.bio.
