- id: recount3-raw-files
  kind: publisher_doc
  url: https://rna.recount.bio/docs/raw-files.html
  label: recount3 Documentation — Raw Files organization
  excerpt: A data source specifies where the data is hosted at, most commonly from the Sequence Read Archive
    (SRA). A collection is a manually curated set of samples from one or more studies. We have annotation
    files, project-level count files (gene, exon, exon-exon junction), project-level metadata files, and
    sample-level BigWig files.
  retrieved_at: '2026-06-20'

