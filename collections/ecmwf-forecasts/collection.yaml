summary:
  copy:
    headline: Free open subset of ECMWF real-time IFS and AIFS forecasts
    lede: ECMWF Open Data is a free, openly licensed subset of the European Centre's real-time weather
      forecasts from the IFS and AIFS models, released under CC-BY-4.0.
    text: 'ECMWF Open Data is the freely available subset of the European Centre for Medium-Range Weather
      Forecasts'' real-time forecast products, drawn from the medium-range (high-resolution and ensemble)
      and seasonal forecast models. It covers output from both the physics-based Integrated Forecasting
      System (IFS) and the machine-learning Artificial Intelligence Forecasting System (AIFS): IFS data
      are released at the end of the real-time dissemination schedule, AIFS data as soon as they are produced.
      Products are available at 0.25-degree resolution in GRIB2, which has used CCSDS compression since
      July 2023. Use is governed by the Creative Commons CC-BY-4.0 licence and the ECMWF Terms of Use,
      permitting commercial redistribution and reuse subject to appropriate attribution. As of IFS Cycle
      50r1 (May 2026) the scda and scwv streams were discontinued, with 06z/18z atmospheric and wave data
      now served under stream=oper and stream=wave.'
  refs:
  - ecmwf-opendata-terms

