prefixes:
- prefix: 202*/
  copy:
    headline: Real-time open forecast runs, partitioned by run date
    lede: Each dated partition groups one period of ECMWF's real-time open forecasts — a continuous release
      series of the same IFS and AIFS product rather than independent datasets.
    text: 'These date partitions form a continuous release series of ECMWF''s real-time open forecasts:
      successive runs of the same IFS and AIFS product, drawn from the medium-range (high-resolution and
      ensemble) and seasonal forecast models, rather than a set of independent datasets. Fields are GRIB2
      at 0.25-degree resolution and have used CCSDS compression since July 2023; IFS data appear at the
      end of the real-time dissemination schedule and AIFS data as soon as they are produced. As of IFS
      Cycle 50r1 (May 2026) the scda and scwv streams were discontinued, with 06z/18z atmospheric and
      wave data now served under stream=oper and stream=wave.'
  refs:
  - ecmwf-opendata-terms

