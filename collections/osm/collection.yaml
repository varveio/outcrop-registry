summary:
  copy:
    headline: OpenStreetMap planet data, mirrored on AWS
    lede: OpenStreetMap is a free, editable map of the whole world built by volunteer mappers and stewarded
      by the OpenStreetMap Foundation, with its complete data archives mirrored on Amazon S3.
    text: 'OpenStreetMap is a free, editable map of the whole world, created and maintained by a global
      community of volunteer mappers who contribute roads, trails, cafes, railway stations, and much more.
      The project began because most maps treated as free carry legal or technical restrictions on reuse.
      The OpenStreetMap Foundation, a non-profit, supports the project and owns its core infrastructure.


      Regular OSM data archives are made available in Amazon S3 in standard formats (OSM PBF and XML)
      and cloud-native formats optimized for analytics. The OSMF-managed bucket in eu-central-1 is the
      primary mirror of the weekly planet outputs also served from planet.openstreetmap.org, with a replicated
      copy in us-west-2. The data is published under the Open Data Commons Open Database License (ODbL):
      reuse requires crediting "© OpenStreetMap contributors" and releasing any derived database under
      the same license.'
  refs:
  - osm-homepage
  - osm-aws-registry
  - osm-copyright

