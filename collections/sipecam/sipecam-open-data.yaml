- prefix: alf_data/
  copy:
    headline: Storage reserved for Alfresco
    lede: Storage that the project's S3 documentation reserves for Alfresco use, separate from the easy-access
      data/ path.
    text: Marked in the project's S3 documentation as reserved for Alfresco use. Unlike the easy-access
      monitoring media, it is not laid out by the cumulo, node, device and extraction-date nomenclature
      that organizes that data.
  refs:
  - sipecam-s3info

- prefix: data/
  copy:
    headline: Easy-access monitoring media by cumulo, node, device and date
    lede: SiPeCaM's easy-access subset of monitoring media, organized by monitoring cumulo, then node,
      capture device, extraction date and data type.
    text: 'Per the project''s S3 documentation, this is the easy-access path into SiPeCaM''s monitoring
      media. Records nest from a cumulo (a cluster of monitoring sites), then a node nomenclature, then
      the capture-device serial number, then the extraction date (YYYY-MM-DD), and finally a type-of-data
      folder.


      The type-of-data folders separate images_videos — camera-trap .JPG photographs and .mp4 / .AVI video
      — from audio, which is further split into ultrasonic and audible recordings.'
  refs:
  - sipecam-s3info

