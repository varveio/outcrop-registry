- prefix: snmb/
  copy:
    text: Processed data associated with the Sistema Nacional de Monitoreo de la Biodiversidad (SNMB),
      the CONABIO-coordinated national biodiversity monitoring effort that SiPeCaM calibrates and complements.
      The SNMB is a coordinated effort of the Mexican federal government — through CONABIO together with
      CONAFOR and CONANP — to generate and improve biodiversity information, with data delivered to CONABIO
      to be stored, systematized and processed. The processed_data subfolder contains the processed outputs
      of that program, published alongside the SiPeCaM permanent-sites data with which it shares CONABIO's
      biodiversity-monitoring lineage.
    headline: Processed data associated with the Sistema Nacional de Monitoreo de…
    lede: Processed data associated with the Sistema Nacional de Monitoreo de la Biodiversidad (SNMB),
      the CONABIO-coordinated national biodiversity monitoring effort that SiPeCaM calibrates and complements.
  refs:
  - snmb-context

