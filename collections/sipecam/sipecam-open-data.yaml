- prefix: raw-land-data/
  copy:
    headline: Raw, as-delivered field data from the monitoring sites
    lede: Raw field data brought back from SiPeCaM's monitoring sites, captured before it is organized
      into the publisher's easy-access tree.
    text: As-delivered media from SiPeCaM's field collection, distinct from the cleaned-up data/ path
      the project documents for easy access. It carries the project's field-collected data types — camera-trap
      visual data used to identify taxa to class, family, genus or species, and sound recordings including
      bat calls captured in the field across the permanent monitoring sites.
  refs:
  - sipecam-readme

