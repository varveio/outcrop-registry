summary:
  copy:
    headline: 'Mexico-wide biodiversity monitoring: camera-trap imagery and field audio'
    lede: SiPeCaM is CONABIO's national biodiversity monitoring and permanent-calibration-sites system,
      publishing camera-trap imagery and field audio collected across Mexico for training and reference.
    text: 'A national monitoring system of biodiversity and permanent sites for calibration, run by CONABIO
      (Comisión Nacional para el Conocimiento y Uso de la Biodiversidad), Mexico''s federal biodiversity
      commission. It collects visual and sound data and makes it freely available to the community, so
      others can train neural-network models and use the records as a reference for which species were
      present at a site over time. Visual data supports identification to class, family, genus or species;
      sound data includes bat calls recorded in the field with external specialists.


      The published bucket carries a subset of the complete project dataset across three data types: images
      (.jpg), videos (.mp4) and audio (.avi), with audio further split into ultrasonic and audible recordings.
      Under the easy-access data/ path the records nest by monitoring cumulo (a cluster of sites), then
      node nomenclature, capture-device serial number, extraction date, and finally the type-of-data folder.'
  refs:
