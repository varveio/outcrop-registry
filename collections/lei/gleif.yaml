      every Legal Entity Identifier, including legal name, registered and headquarters address, registration
      and entity status, and validation metadata. The same Golden Copy content as the CSV and XML deliveries,
      encoded as JSON for programmatic consumption, written as gzip-compressed files partitioned by publication
