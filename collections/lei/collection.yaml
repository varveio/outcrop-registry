summary:
  copy:
    headline: GLEIF Golden Copy — the global LEI register and its reference data
    lede: 'The complete Global LEI Index from the Global Legal Entity Identifier Foundation (GLEIF): every
      Legal Entity Identifier and its Legal Entity Reference Data, published three times daily as deduplicated
      Golden Copy files under CC0.'
    text: 'GLEIF maintains the Legal Entity Identifier (LEI), a 20-character ISO 17442 code that uniquely
      identifies legal entities in financial transactions, together with the Legal Entity Reference Data
      (LE-RD) attached to each one. This collection mirrors GLEIF''s Golden Copy: a deduplicated, authoritative
      snapshot of the Global LEI Index in which each LEI appears exactly once, spanning current and historical
      records. Three concatenated data products are published — LEI-CDF records (Level 1 ''who is who''
      entity reference data), Relationship Records (RR-CDF, the Level 2 ''who owns whom'' direct and ultimate
      parent relationships), and Reporting Exceptions (where an entity cannot or does not report a parent).
      Each product is delivered in CSV, JSON and XML, refreshed three times a day (02:00, 10:00 and 18:00
      UTC) and organized into date- and time-partitioned gzip files. The data is published under CC0 1.0,
      placing it in the public domain for any use.'
