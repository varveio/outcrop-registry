summary:
  copy:
    headline: Benchmark of ~20M Windows PE files for malware detection research
    lede: 'SOREL-20M is the Sophos-ReversingLabs 20 Million dataset: labels, EMBER-v2 features, and metadata
      for ~10M benign and ~10M malicious Windows PE files, with disarmed-but-complete binaries for every
      malware sample.'
    text: SOREL-20M is a production-scale benchmark for training and evaluating machine-learning malware
      detectors, released in December 2020 as a collaboration between Sophos AI and ReversingLabs. It
      provides ground-truth labels, EMBER-v2 feature vectors, behavioral tag counts, and pefile-derived
      metadata for roughly 20 million Windows Portable Executable files split evenly between benign and
      malicious, alongside disarmed-but-otherwise-complete binaries for the malware half. The release
      ships under one dated prefix (09-DEC-2020) holding the disarmed binaries (~8TB), pre-extracted LightGBM
      .npz feature arrays, LMDB feature and metadata stores plus a meta.db index, and pre-trained feed-forward
      neural network and LightGBM baseline models with evaluation results. The companion code repository
      supplies training, evaluation, and plotting scripts. Total footprint is about 8TB, so consumers
      are encouraged to fetch only the elements they need.
  refs:
  - sorel-readme
  - sorel-aws-registry

