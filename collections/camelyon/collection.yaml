summary:
  copy:
    headline: Whole-slide lymph-node pathology for breast-cancer metastasis detection
    lede: CAMELYON pairs the CAMELYON16 and CAMELYON17 grand-challenge releases into 1,399 H&E-stained
      whole-slide images of sentinel lymph-node sections, with pathologist annotations for automated metastasis
      detection.
    text: 'CAMELYON (CAncer MEtastases in LYmph nOdes challeNge) is a digital-pathology benchmark from
      the Diagnostic Image Analysis Group and Department of Pathology at Radboud University Medical Center.
      It unifies the two grand-challenge releases: CAMELYON16 (399 whole-slide images from Radboud UMC
      and UMC Utrecht, framed as slide-level metastasis detection) and CAMELYON17 (1,000 slides from 100
      patients across five Dutch medical centres, framed as patient-level pN-stage prediction), for 1,399
      H&E-stained sentinel lymph-node sections totalling roughly 3 TB. Images are multi-resolution TIFF
      pyramids readable with OpenSlide or ASAP; ground truth ranges from lesion-level XML contour annotations
      and binary tumour masks to patient-level pN-stage labels, all prepared under expert-pathologist
      supervision. The collection is organized into two top-level releases, each carrying images, masks,
      annotations, and evaluation material.'
