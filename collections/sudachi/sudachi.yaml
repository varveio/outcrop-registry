schema_version: '0.4'
bucket: sudachi
backend: s3
role: primary
region: ap-northeast-1

prefixes:
- prefix: chitra/
  copy:
    headline: chiTra — pretrained Japanese Transformer models
    lede: chiTra ("Sudachi Transformers") provides pretrained Japanese language models with a matching
      Sudachi-based tokenizer for the Transformers ecosystem.
    text: 'Contains chiTra, pretrained Japanese Transformer language models from NINJAL and Works Applications,
      packaged with a Sudachi-based tokenizer. The released models are trained on the NINJAL Web Japanese
      Corpus (NWJC): version 1.0 on roughly 109GB of NWJC text and version 1.1 on a further-cleaned 79GB
      subset, distributed as the chiTra-1.0 and chiTra-1.1 archives. Experimental models trained on Wikipedia
      (Wiki-40B) for NLP2022 are kept under a separate nlp2022 subfolder.'
  refs:
  - chitra-readme-license

- prefix: chive/
  copy:
    headline: chiVe — Japanese pretrained word embeddings
    lede: chiVe ("Sudachi Vector") is a set of Japanese pretrained word embeddings trained over large
      web corpora with Sudachi's multi-granular tokenization.
    text: 'Contains chiVe, Japanese pretrained word embeddings built by NINJAL and Works Applications.
      The vectors are trained with word2vec (gensim) skip-gram over text tokenized by Sudachi: versions
      1.0-1.2 use the NINJAL Web Japanese Corpus (NWJC, roughly 100 million web pages) and version 1.3
      uses CommonCrawl text. Each version is published in several minimum-count variants (mc5, mc15, mc30,
      mc90) and three formats — word2vec text and gensim KeyedVectors archives, plus Magnitude files for
      streaming, on-demand vector lookup.'
  refs:
  - chive-readme-license

- prefix: sudachidict/
  copy:
    headline: SudachiDict — built morphological-analysis dictionaries
    lede: Pre-built editions of SudachiDict, the lexicon the Sudachi tokenizer uses to segment and analyze
      Japanese text, packaged for download.
    text: 'Contains the ready-to-use builds of SudachiDict, the dictionary that drives Sudachi''s multi-granular
      Japanese morphological analysis. SudachiDict ships in three editions that trade coverage for size:
      Small holds only the UniDic vocabulary, Core adds the default basic vocabulary, and Full further
      includes a wide range of proper nouns. Releases are versioned by dictionary date and distributed
      as packaged archives (sudachi-dictionary and SudachiDict builds). The dictionary incorporates UniDic
      and a part of NEologd as upstream lexical sources.'
  refs:
  - sudachidict-readme-license

- prefix: sudachidict-raw/
  copy:
    headline: SudachiDict raw lexicon sources
    lede: The raw lexicon files SudachiDict is compiled from, released as zipped source archives keyed
      by dictionary version.
    text: Contains the raw lexicon source files from which the built SudachiDict editions are compiled,
      distributed as zipped archives organized by dictionary version. The sources mirror the edition split
      — core, notcore, and small lexicons — so a dictionary can be rebuilt or audited from its inputs.
      Like the built dictionaries, these sources incorporate UniDic and a part of NEologd.
  refs:
  - sudachidict-readme-license

- prefix: sudachisynonym/
  copy:
    headline: Sudachi Synonym Dictionary
    lede: The Sudachi Synonym Dictionary adds synonym groupings to entries in the Sudachi dictionary,
      released as versioned archives.
    text: Contains the Sudachi Synonym Dictionary, which attaches synonym information to words registered
      in SudachiDict. The data is a CSV (RFC 4180, UTF-8) with one entry per line carrying up to eleven
      fields — a synonym-group number, part-of-speech and expansion-control flags, notation and abbreviation
      details, and the headword — capturing relationships such as alternative notations, translations,
      former terms, and misspellings across many subject domains. It is released as versioned zipped archives
      and shares SudachiDict's license.
  refs:
  - synonym-readme-license

