summary:
  copy:
    headline: Japanese NLP dictionaries, word embeddings, and language models
    lede: Sudachi Language Resources is the open data published by Works Applications' WAP Tokushima Laboratory
      of AI and NLP — the SudachiDict tokenizer dictionary, chiVe word embeddings, and chiTra Transformer
      models for Japanese.
    text: Sudachi Language Resources collects the downloadable data behind the Sudachi family of Japanese
      natural-language-processing tools built by the WAP Tokushima Laboratory of AI and NLP at Works Applications.
      It bundles SudachiDict, the multi-granular morphological-analysis dictionary used by the Sudachi
      tokenizer (Small, Core, and Full editions, plus its raw lexicon sources and a synonym dictionary);
      chiVe, Japanese pretrained word embeddings trained with word2vec over large web corpora and tokenized
      with Sudachi; and chiTra, pretrained Japanese Transformer language models with a matching tokenizer.
      The data is hosted on Amazon S3 under the AWS Open Data Sponsorship Program and released under the
      Apache License 2.0.
  refs:
