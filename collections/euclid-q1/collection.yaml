summary:
  copy:
    headline: Euclid mission's first public Quick Release (Q1)
    lede: Euclid Q1 is the first Quick Release from ESA's Euclid mission — roughly 35 TB of imaging, spectroscopy,
      and catalogs over four deep fields, served by NASA/IPAC's IRSA.
    text: 'Euclid Quick Release 1 (Q1) is approximately 35 TB of imaging, spectroscopy, and catalogs covering
      four non-contiguous fields: Euclid Deep Field North (22.9 sq deg), Euclid Deep Field Fornax (12.1
      sq deg), Euclid Deep Field South (28.1 sq deg), and LDN1641. It contains VIS and NISP calibrated
      and raw frames, MER multiwavelength co-added mosaics, SIR slitless spectroscopy, Level 3 visibility
      masks, and an extensive set of catalogs — the MER, PHZ photometric-redshift, and SPE spectroscopic-redshift,
      lines, and models catalogs. IRSA serves the full release with browsable and cloud access alongside
      the Euclid Data Explorer, astroquery, and the SIA/TAP/SCS/SSA virtual-observatory protocols, each
      product carrying its own IRSA DOI. Using the data requires citing the Q1 journal article and the
      appropriate DOI and including ESA''s Quick Release acknowledgement.'
  refs:
  - euclid-q1-overview

