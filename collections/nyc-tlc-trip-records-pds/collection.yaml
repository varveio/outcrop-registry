summary:
  copy:
    headline: NYC yellow & green taxi trips, 2009–2015 coordinate-level snapshot
    lede: A frozen 2009–2015 archive of New York City yellow and green (boro) taxi trip records that uniquely
      preserves the original pickup and drop-off GPS coordinates the TLC later removed.
    text: 'New York City Taxi & Limousine Commission trip records capture each yellow and green (boro)
      taxi ride — pickup and drop-off dates, times and locations, trip distances, itemized fares, rate
      and payment types, and driver-reported passenger counts — collected through the TPEP/LPEP technology-provider
      programs. This is a frozen legacy snapshot covering 2009 through 2015 only, in both Parquet and
      the original bzip2 CSV; it does not track ongoing TLC data, which is published separately on the
      current nyc-tlc distribution and the TLC trip-record page. Its distinguishing property is granularity:
      it retains the original pickup_longitude/latitude and dropoff_longitude/latitude columns. When the
      TLC reprocessed and replaced all historical trip files (Parquet, May 2022) it had already, from
      July 2016, dropped point coordinates in favor of coarse taxi-zone IDs (PULocationID/DOLocationID)
      — so for 2009–2015 this archive is finer-grained than the canonical files and its column schema
      differs from current TLC Parquet. The TLC notes it did not create the data and makes no representations
      as to its accuracy.'
  refs:
  - tlc-trip-record-page
  - coordinate-reprocessing

