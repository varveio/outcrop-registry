summary:
  copy:
    headline: 3D CityGML building models for the entire United States
    lede: Open City Model is an open dataset of roughly 125 million US building geometries published by
      the non-profit BuildZero.Org under the ODbL.
    text: 'Open City Model (OCM) assembles open building-footprint sources — chiefly Microsoft''s USBuildingFootprints,
      plus OpenStreetMap and regional datasets — into a single unified set of 3D building geometries covering
      the United States, around 125 million buildings in all. Each building is rendered as an LOD1 solid
      in the international CityGML urban-data standard, with footprint area, modeled height, US state
      and county FIPS codes, source attribution, and a Universal Building ID (UBID) carried as attributes;
      coordinates use EPSG:4979 (WGS84 lat/lon in degrees, height in meters).


      The data is published on AWS S3 in three content-identical encodings — CityGML (gml, zip-compressed),
      CityJSON (json), and Parquet — organized first by data-version release, then by format, then by
      US state, then partitioned by county into files of about 40,000 buildings. OCM was created by BuildZero.Org,
      a 501(c)(3) non-profit building open digital infrastructure for climate-action applications, to
      accelerate the use of 3D urban models.'
  refs:
  - ocm-readme

