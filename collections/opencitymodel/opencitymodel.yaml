- prefix: 2019-feb/
  copy:
    headline: February 2019 release — CityGML and CityJSON building models
    lede: The 2019-feb release of Open City Model carries US LOD1 building geometries in zip-compressed
      CityGML and CityJSON, organized by state and county.
    text: This dated release of Open City Model provides 3D LOD1 building models in two content-identical
      encodings — CityGML (gml, zip-compressed) and CityJSON (json). Within each format the data is split
      into one folder per US state and then partitioned by county FIPS code into files of roughly 40,000
      buildings, following the project's standard <format>/<State>/<CountyFIPS>/ layout. Each building
      carries footprint area, modeled height, state and county codes, source attribution, and a UBID.
