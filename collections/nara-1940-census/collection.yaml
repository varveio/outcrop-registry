summary:
  copy:
    headline: The digitized 1940 U.S. Census on AWS
    lede: 'The 1940 U.S. Census is NARA''s open-data release of the full decennial census: ~3.7 million
      digitized images of population schedules, district maps, and district descriptions, plus a JSON
      metadata index.'
    text: 'The 1940 Census population schedules were created by the Bureau of the Census to enumerate
      every person living in the United States on April 1, 1940. The National Archives and Records Administration
      (NARA) digitized the schedules and released them publicly on April 2, 2012, and published the records
      to the AWS Registry of Open Data. Alongside the schedules, the release includes enumeration district
      maps of counties, cities, and minor civil divisions showing district boundaries and numbers, and
      written enumeration district descriptions, with nationwide coverage that includes territorial areas.


      The imagery totals 15.1439 terabytes across roughly 3.7 million JPG images, organized under the
      population-schedules/, ed-maps/, and ed-descriptions/ prefixes, with a 251-megabyte JSON metadata
      index under metadata/. As federal records the materials are a US Government work, and the data can
      be listed and pulled anonymously with --no-sign-request; portions and individual states or territories
      can be retrieved by prefix.'
  refs:
  - nara-1940-registry
  - nara-1940-developer-doc

