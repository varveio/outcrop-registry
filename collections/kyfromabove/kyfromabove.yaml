prefixes:
- prefix: elevation/Contours/
  copy:
    headline: LiDAR-derived topographic contours
    lede: Cartographic contour lines generated from the KyFromAbove Phase 1 DEM, distributed in geopackage
      and Esri file geodatabase format.
    text: 'Topographic contours generated from the KyFromAbove Phase 1 LiDAR-derived digital elevation
      model, in geopackage and Esri file geodatabase format. They are published at several intervals:
      10-foot, 20-foot, and 40-foot by region, and 5-foot statewide. The publisher''s data catalog lists
      the contour layers as public.'
  refs:
  - kyfromabove-aws-docs-readme

- prefix: elevation/DEM/
  copy:
    headline: LiDAR-derived bare-earth digital elevation models
    lede: Bare-earth DEMs for Kentucky, derived from KyFromAbove LiDAR and organized on a 5000x5000 foot
      grid as Cloud Optimized GeoTIFFs.
    text: 'LiDAR-derived bare-earth digital elevation models covering Kentucky, organized on a 5000x5000
      foot grid as Cloud Optimized GeoTIFFs. Resolution follows the acquisition phase: Phase 1 at 5-foot,
      and Phases 2 and 3 at 2-foot. Phase 2 and Phase 3 had not achieved statewide coverage at the time
      of documentation, so the highest-resolution DEMs are available only for the areas those phases have
      flown.'
  refs:
  - kyfromabove-aws-docs-readme

- prefix: elevation/KyTopoMapSeries/
