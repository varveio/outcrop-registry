    text: 'The KyTopo Map Series of Kentucky topographic quadrangle maps. It is published in three forms:
      georeferenced quadrangle maps as Cloud Optimized GeoTIFFs (COGs), non-georeferenced PNG versions
      sized for ARCH-D printing (PNGs), and an accompanying quadrangle tile grid.'
  refs:
  - kyfromabove-aws-docs-readme

