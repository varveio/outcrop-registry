summary:
  copy:
    headline: Kentucky statewide aerial imagery and LiDAR elevation basemap
    lede: KyFromAbove is the Kentucky Aerial Photography & Elevation Data (KYAPED) program, publishing
      statewide leaf-off orthoimagery, oblique imagery, and LiDAR-derived elevation products as open public-domain
      geospatial data.
    text: 'KyFromAbove is the public face of the Kentucky Aerial Photography & Elevation Data (KYAPED)
      program, administered by the Commonwealth Office of Technology, Office of Architecture and Governance,
      Division of Geographic Information. It maintains a current statewide basemap of Kentucky from high-resolution
      color leaf-off aerial imagery and LiDAR elevation data. The data divides into two families: imagery
      (natural-color nadir orthoimagery and four-direction oblique imagery as Cloud Optimized GeoTIFFs
      on a 5000x5000 foot grid) and elevation (LiDAR-derived bare-earth DEMs, point clouds, contours,
      spot elevations, and the KyTopo map series). Acquisition runs in successive project phases, with
      Phase 1 at coarser resolution and Phases 2 and 3 at finer resolution. All basemap data is owned
      by the Commonwealth and dedicated to the public domain, freely available to government, the private
      sector, and the public, with attribution to the Commonwealth requested.'
  refs:
  - kyfromabove-aws-docs-readme
  - kyfromabove-public-domain-terms

