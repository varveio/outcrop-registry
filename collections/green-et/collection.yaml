summary:
  copy:
    headline: Monthly green (rainfall-sourced) evapotranspiration rasters for Africa
    lede: IWMI DIWASA Green ET is a continental-Africa record of monthly green evapotranspiration — the
      share of ET supplied by rainfall and soil moisture — published by the International Water Management
      Institute.
    text: 'Green ET (rainfall ET) is the portion of evapotranspiration derived from green water: evaporation
      from rain-replenished soil, transpiration from rainfed crops and natural vegetation, and interception
      losses. It is produced by IWMI''s Digital Innovations for a Water Secure Africa (DIWASA) project
      under the Water Accounting+ (WA+) framework, computed from SSEBop evapotranspiration as total ET
      minus blue (incremental) ET, with support from the Helmsley Charitable Trust. The collection spans
      continental Africa as monthly Cloud-Optimized GeoTIFFs at roughly 1 km resolution (~0.0095deg, EPSG:4326)
      covering 2003 onward, each raster paired with a STAC item describing it. It supports rainfed-agriculture
      analysis, drought monitoring, and basin-to-national water accounting, and is distributed openly
      on the Registry of Open Data on AWS as a companion to the DIWASA Blue (incremental) ET product.'
  refs:
  - green-et-aws-registry-yaml
  - green-et-dea-specs
  - green-et-iwmi-diwasa-open

