summary:
  copy:
    headline: HPC cluster telemetry from the MIT Supercloud system
    lede: The MIT Supercloud Dataset is an open release of anonymized scheduler logs and CPU/GPU time-series
      telemetry from the MIT Supercloud HPC system, published by the MIT Datacenter Challenge.
    text: 'The MIT Supercloud Dataset captures detailed monitoring logs from the MIT Supercloud system:
      anonymized Slurm scheduler logs alongside time-series data of CPU and GPU usage, memory usage, file-system
      logs, and physical monitoring such as power and temperature. It is published by the MIT Datacenter
      Challenge — part of the MIT-USAF AI Accelerator FastAI project — to support research into detecting,
      explaining, and predicting anomalies and system failures in large multi-sensor HPC and datacenter
      operations. The release pairs high-level job records (nodes, CPU/GPU/memory requests, exit codes,
      run time) with low-level per-job hardware-utilization series, and is updated annually. It is distributed
      under the Creative Commons Attribution-NonCommercial-NoDerivatives 4.0 license, with attribution
      to the IEEE HPEC 2021 paper required.'
