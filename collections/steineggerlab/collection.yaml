summary:
  copy:
    headline: Reference databases and search indexes for the Steinegger Lab's bioinformatics tools
    lede: Published by the Steinegger Lab at Seoul National University, this collection bundles the precomputed
      sequence and structure databases that drive ColabFold, Foldseek, Foldcomp, Metabuli, FoldDisco,
      MMseqs2/HH-suite, and AFESM.
    text: 'The Steinegger Lab, led by Martin Steinegger, develops fast, scalable open software for analyzing
      massive genomic and proteomic datasets. This collection is the data side of that work: the ready-to-use
      reference databases and indexes its tools download, organized one top-level prefix per tool. It
      includes the ColabFold MSA databases (UniRef30 and the ColabFold environmental database) for AlphaFold2/RoseTTAFold
      structure prediction, Foldseek''s preprocessed structure-search databases (AlphaFold DB, PDB, Swiss-Prot),
      Foldcomp''s compressed structure collections, FoldDisco''s discontinuous-motif indexes, Metabuli''s
      GTDB/RefSeq taxonomic classification databases, the UniRef30 HH-suite profile databases, and the
      combined AFDB + ESM Atlas structure clusters (AFESM). The data are served openly from the public
      s3://steineggerlab bucket (also fronted over HTTP at opendata.mmseqs.org) as part of the AWS Open
      Data Sponsorship Program. The individual databases are large reference resources derived from upstream
      sources (AlphaFold DB, ESM Atlas, UniProt/UniRef, GTDB, RefSeq, PDB), each carrying its own upstream
      terms.'
  refs:
