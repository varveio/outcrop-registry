summary:
  copy:
    headline: NCBI pre-formatted BLAST sequence databases
    lede: The NCBI BLAST databases are the pre-formatted nucleotide and protein reference databases that
      power BLAST sequence-similarity search, published by the National Center for Biotechnology Information
      at NLM/NIH.
    text: This is NCBI's centralized repository of pre-formatted BLAST databases — the same indexed nucleotide
      and protein collections served from the NCBI BLAST web service and FTP site, mirrored to AWS so
      that searches run next to the data. Nucleotide databases range from the comprehensive nt collection
      through curated references such as 16S/18S/28S ribosomal RNA, ITS and RefSeq representative genomes;
      protein databases include the non-redundant nr set, SwissProt, RefSeq proteins and the Conserved
      Domain Database. Each release is published as a date-stamped snapshot containing the BLAST index
      volumes for every database plus a taxonomy database and a per-database metadata JSON; the pointer
      file latest-dir names the most recent snapshot. The databases are derived from GenBank, RefSeq and
      related NCBI resources and are refreshed periodically.
  refs:
  - blast-docs-readme

