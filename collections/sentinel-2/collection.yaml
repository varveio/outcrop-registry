summary:
  copy:
    headline: Copernicus Sentinel-2 optical land-imaging mission
    lede: Sentinel-2 is the Copernicus high-resolution multispectral optical mission, operated by ESA
      and the European Commission for global land and vegetation monitoring.
    text: 'Sentinel-2 is a wide-swath, high-resolution optical Earth-observation mission within the European
      Union''s Copernicus programme, operated by the European Space Agency. Its constellation of identical
      satellites (Sentinel-2A, -2B and -2C) each carries the MultiSpectral Instrument (MSI), a push-broom
      sensor sampling 13 spectral bands from the visible through the shortwave infrared at 10, 20 and
      60 m resolution across a 290 km swath, delivering global land coverage on a 5-day revisit.


      The imagery underpins agriculture, forestry, land-cover mapping, water-quality and disaster-response
      applications, and is published on AWS by Element 84 (with Sinergise) as the Level-1C and Level-2A
      archives. This collection''s currently indexed objects are the S3 Inventory of the Level-1C archive
      — the daily manifest of that bucket — rather than the scene imagery itself.'
