summary:
  copy:
    headline: Continental-scale rainfed vs. irrigated cropland classification for Africa
    lede: The IWMI DIWASA Rainfed and Irrigated Cropland Map disaggregates African cropland into rainfed
      and irrigated classes using a Budyko water-balance framework, published by the International Water
      Management Institute.
    text: 'This product partitions cropland across continental Africa into rainfed and irrigated classes
      by applying a Budyko-model water balance over eight remote-sensing land-cover products and a high-confidence
      cropland map (HCCM), all translated to the LUWA (Land Use for Water Accounting) classification system.
      It was developed under IWMI''s Digital Innovation for Water Secure Africa (DIWASA) initiative to
      support agricultural water-accounting and water-use studies where existing crop masks disagree.


      The data is organized around the HCCM and per-class probability layers, and validation against an
      independent reference set reported 73% overall accuracy with high precision and specificity for
      identifying irrigated areas. The method and validation are documented in Owusu et al., "A framework
      for disaggregating remote-sensing cropland into rainfed and irrigated classes at continental scale."'
