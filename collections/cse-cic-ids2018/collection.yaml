summary:
  copy:
    headline: Benchmark intrusion-detection dataset with raw captures and flow features
    lede: CSE-CIC-IDS2018 is a profile-driven intrusion-detection benchmark from the Communications Security
      Establishment and the Canadian Institute for Cybersecurity, pairing raw network captures with extracted
      flow features across seven attack scenarios.
    text: CSE-CIC-IDS2018 is a benchmark dataset for developing and evaluating network intrusion-detection
      systems, built collaboratively by the Communications Security Establishment (CSE) and the Canadian
      Institute for Cybersecurity (CIC) at the University of New Brunswick. It is generated from abstract
      user profiles that encode realistic application, protocol, and attack behaviour, then replayed in
      a controlled AWS testbed of 50 attacking machines against a victim organization of five departments
      spanning 420 machines and 30 servers. The captures cover seven attack families — Brute-force, Heartbleed,
      Botnet, DoS, DDoS, Web attacks, and internal infiltration — recorded over February and March 2018.
      Each machine's raw network traffic and system logs are provided alongside CSV files of 80 network-flow
      features extracted with CICFlowMeter-V3, so the data supports both feature-extraction research on
      the raw captures and machine-learning work on the ready-made flow tables.
  refs:
  - cse-cic-ids2018-cic-page

