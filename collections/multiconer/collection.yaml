summary:
  copy:
    headline: Multilingual complex named-entity-recognition benchmark datasets
    lede: MultiCoNER is a family of large multilingual NER datasets built for the SemEval-2022 Task 11
      and SemEval-2023 Task 2 shared tasks, released by Amazon under CC BY 4.0.
    text: 'MultiCoNER targets the hard cases in named entity recognition: short, low-context, uncased
      text drawn from Wikipedia sentences, questions, and search queries, with syntactically complex entities
      such as movie and product titles and a long-tail entity distribution. The data is built from public
      resources using heuristic sentence sampling, template extraction and slotting, and machine translation,
      and tokens are labeled in the CoNLL format with the BIO scheme.


      Two releases sit side by side. The 2022 release (MultiCoNER 1) spans 11 languages plus multilingual
      and code-mixed subsets over a coarse six-class taxonomy. The 2023 release (MultiCoNER 2) spans 12
      languages over a fine-grained taxonomy of 36 entity classes and adds noisy test instances with character-level
      corruptions. Each release is organized by language, with train/dev/test splits provided as plain-text
      CoNLL files.'
