summary:
  copy:
    headline: Public-domain global basemap data at 1:10m, 1:50m, and 1:110m
    lede: Natural Earth is a public-domain vector and raster map dataset, built by NACIS volunteers, designed
      for small-scale cartography at three nested scales.
    text: 'Natural Earth provides tightly integrated vector and raster basemap data at 1:10 million, 1:50
      million, and 1:110 million scales, built to solve the recurring problem of finding clean, ready-to-map
      reference data for small-scale maps. Data is organized into three themes at each scale: Cultural
      (countries, states and provinces, populated places, roads, railroads, airports, and administrative
      boundaries), Physical (coastline, land and ocean polygons, rivers and lake centerlines, lakes, glaciated
      areas, reefs, and bathymetry), and Raster (shaded relief, cross-blended hypsometric tints, and gray-earth
      basemaps derived from NASA SRTM-Plus elevation). It is built and maintained by a collaboration of
      volunteers supported by NACIS (North American Cartographic Information Society), with a Map Update
      Committee acting as the final arbitrator on features and attributes. Every version is released into
      the public domain and may be used, modified, and redistributed for any purpose without attribution.'
  refs:
  - naturalearth-about
  - naturalearth-terms

