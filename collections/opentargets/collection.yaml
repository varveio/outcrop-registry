summary:
  copy:
    headline: Integrated drug target identification and prioritisation data
    lede: The Open Targets Platform integrates genetics, genomics, and biomedical evidence to support
      systematic identification and prioritisation of therapeutic drug targets.
    text: The Open Targets Platform is a data integration resource that brings together publicly available
      evidence — human genetics, genomics, transcriptomics, drugs, animal models, and scientific literature
      — to score and prioritise gene targets for diseases. It is built by Open Targets, a public-private
      partnership including EMBL-EBI, the Wellcome Sanger Institute, and industry partners. The full Platform
      output is released quarterly as Apache Parquet datasets covering targets, diseases, drugs, evidence,
      and target-disease associations, and is openly available through FTP, Google Cloud, Microsoft Azure,
      and the AWS Registry of Open Data. The data is dedicated to the public domain under CC0 1.0, while
      the pipelines, GraphQL API, and web application that power the Platform are open source under Apache
      2.0.
