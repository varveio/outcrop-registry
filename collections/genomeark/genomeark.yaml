schema_version: '0.4'
bucket: genomeark
backend: s3
role: primary
region: us-east-1

prefixes:
- prefix: downstream_analyses/
  copy:
    headline: Cross-species products derived from the reference assemblies
    lede: downstream_analyses/ groups derived results computed across GenomeArk's reference assemblies,
      rather than the primary per-species sequencing data.
    text: downstream_analyses/ collects products built on top of the curated per-species assemblies instead
      of the raw reads. Where the per-species tree under species/ holds genomic and transcriptomic data,
      draft assemblies, and final curated references, this grouping is the analysis layer derived from
      those genomes.
  refs:
  - genomeark-bucket-structure

- prefix: galaxy/
  copy:
    headline: Assembly-workflow example data for the Galaxy platform
    lede: galaxy/ groups example datasets tied to the genome-assembly workflow as run on the Galaxy platform.
    text: galaxy/ contains example data associated with the genome-assembly workflow on the Galaxy platform,
      distinct from the primary per-species releases. The species tree under species/ holds the genomic
      and transcriptomic reads, draft assemblies, and curated references; this grouping sits alongside
      it as workflow-oriented example material.
  refs:
  - genomeark-bucket-structure

- prefix: species/
  copy:
    headline: Per-species reference genomes and their source sequencing data
    lede: species/ is GenomeArk's core tree, one record per species keyed by binomial name and ToLID,
      gathering the raw sequencing reads, draft assemblies, and the final curated reference for each.
    text: 'Each record follows species/{Genus_species}/{ToLID}/, where the binomial scientific name and
      Tree-of-Life specimen identifier name the species and specimen. A record gathers genomic_data (raw
      sequencing reads organized by platform: PacBio HiFi, ONT, Illumina, Arima/Dovetail Hi-C, Bionano,
      10x), transcriptomic_data (RNA-seq/Iso-seq reads organized by tissue), one or more assembly_{pipeline}_{ver}
      draft assemblies, assembly_MT_{institution} mitochondrial assemblies, and assembly_curated, the
      final curated reference.'
  note: Each sub-directory is one species' reference genome within a single growing collection of vertebrate
    assemblies.
  refs:
  - genomeark-bucket-structure
  - genomeark-collection
  boundary: pin

- prefix: trainingmaterials/
  copy:
    headline: Example datasets for genome-assembly and curation training
    lede: trainingmaterials/ groups the example datasets distributed for genome-assembly and curation
      training events.
    text: trainingmaterials/ contains the data packages used in training events on genome assembly and
      curation, kept separate from the primary species releases. Unlike the per-species tree under species/,
      which carries the sequencing reads, draft assemblies, and curated references for each species, this
      grouping is instructional material.
  refs:
  - genomeark-bucket-structure

- prefix: working/
  kind: other
  copy:
    headline: Active working space for in-progress assembly and analysis
    lede: working/ is GenomeArk's in-progress workspace for ongoing assembly and analysis, not a curated
      release.
    text: working/ is the active, non-release working space used while assemblies are being produced.
      The published, citable products live under species/, where each record gathers raw genomic and transcriptomic
      reads, draft assemblies, and the final assembly_curated reference; working/ is the upstream space
      that feeds them.
  refs:
  - genomeark-bucket-structure

