summary:
  copy:
    headline: Vertebrate reference genomes, organized one record per species
    lede: GenomeArk is a public AWS S3 repository of vertebrate reference genomes, laid out as a per-species
      tree keyed by binomial name and Tree-of-Life specimen identifier (ToLID).
    text: 'GenomeArk (genomeark.org) gathers the reference genomes and the sequencing data behind them,
      primarily as a per-species tree. Each species record is keyed by its binomial scientific name (Genus_species)
      and a Tree-of-Life specimen identifier (ToLID), and carries the raw genomic_data organized by sequencing
      platform (PacBio HiFi, ONT, Illumina, Arima/Dovetail Hi-C, Bionano, 10x), transcriptomic_data organized
      by tissue, draft assemblies from named pipelines, mitochondrial assemblies, and assembly_curated,
      the final curated reference.


      Data is downloadable anonymously over S3. The stewards ask that users respect access to and credit
      the sources of unpublished data held in the repository.'
  refs:
