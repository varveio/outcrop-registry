summary:
  copy:
    headline: Open, petabyte-scale repository of web crawl data
    lede: Common Crawl is the largest free and open repository of web crawl data, published by the nonprofit
      Common Crawl Foundation and hosted on Amazon S3.
    text: 'Common Crawl has crawled the web and freely released its archives since 2008, run by a 501(c)(3)
      nonprofit whose mission is to democratise access to web information. The petabyte-scale corpus lives
      in the public s3://commoncrawl bucket (us-east-1) under the AWS Open Data Sponsorship Program, so
      it can be read anonymously without an AWS account and without requester-pays charges from within
      the region; it is also reachable over CloudFront and an HTTPS gateway at data.commoncrawl.org. A
      new main crawl is released roughly monthly, and the corpus is used widely across academia and industry,
      including as a primary source of training data for large language models. The data is governed by
      Common Crawl''s own Terms of Use rather than a standard open-content licence: because the corpus
      is crawled third-party web content, the terms disclaim ownership of that content and require users
      to respect the copyrights and rights of the original publishers.'
