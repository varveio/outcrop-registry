- prefix: index2012/
  copy:
    headline: Early one-off URL index over the 2012 corpus
    lede: An early, retrospective URL index built over the 2012 Common Crawl corpus, predating the standardised
      per-crawl index layout.
    text: 'Common Crawl''s first public per-crawl URL index practice began in 2015, releasing a ZipNum-clustered
      CDX index alongside each crawl under cc-index/collections/, starting with the January and February
      2015 crawls. This index is distinct from that work: it is the earlier, one-off index built retrospectively
      over the 2012 corpus, the earliest entry in Common Crawl''s index history, before the standardised
      per-crawl collections/ layout was introduced.'
  refs:
