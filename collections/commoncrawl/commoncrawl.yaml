- prefix: crawl-data/CC-NEWS/
  copy:
    headline: Continuous crawl of global news sites
    lede: CC-NEWS is a continuously collected crawl of news websites worldwide, published as a separate,
      faster-cadence sub-dataset from the monthly main crawls.
    text: 'CC-NEWS publishes WARC files daily, organised by year and month starting in 2016, so time-sensitive
      content is available quickly: decoupling the news from the main dataset as a smaller sub-dataset
      makes it feasible to publish WARC files shortly after they are written. The crawler was designed
      to continuously release freshly crawled data and to incorporate new seeds quickly and efficiently.
      It is published in WARC format like the main crawl, but uses the StormCrawler framework built on
      Apache Storm rather than the Apache Nutch-based crawler used for the monthly crawls; its continuous,
      news-focused cadence and separate crawler stack make it a distinct product within the corpus.'
  refs:
  - cc-news

- prefix: crawl-data/wdc/
  copy:
    headline: Web Data Commons structured-data extractions
    lede: Web Data Commons extractions of structured data drawn from the Common Crawl corpus, deposited
      in-bucket by a third-party research project.
    text: Web Data Commons is a research project started in 2012 and now mainly maintained by the Data
      and Web Science Research Group at the University of Mannheim, which extracts structured data from
      Common Crawl and offers it for public download to support researchers and companies. Its extractions
      include large corpora of Microdata, Microformats, RDFa and schema.org annotations; relational HTML
      web tables (around 147 million relational tables drawn from roughly 11 billion HTML tables); and
      hyperlink graphs, such as a 2012 graph of about 3.5 billion pages and 128 billion links and a 2014
      graph of about 1.7 billion pages. These are derived from the corpus by a third-party producer rather
      than being original Common Crawl crawl output.
  refs:
  - wdc

