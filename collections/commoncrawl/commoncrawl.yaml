- prefix: projects/cc-open-athena-test/CC-SUPPLEMENTAL-2026-22/
  kind: other
  copy:
    headline: Supplemental crawl for Athena index testing
    lede: A supplemental, non-CC-MAIN crawl used to validate Common Crawl's Athena-queryable columnar
      indexing pipeline.
    text: Common Crawl publishes a columnar Apache Parquet URL index that can be queried via AWS Athena.
      This supplemental crawl is internal test material for Athena-queryable open table formats, indexed
      under index/collections/ and index/table/cc-supplemental/warc/ with segments/, used to validate
      the Athena indexing pipeline rather than as part of the main monthly corpus.
  refs:
  - ccsupp

- prefix: projects/gneissweb-annotation-testing-v1/
  copy:
    headline: GneissWeb annotations
    lede: The GneissWeb quality and category annotations at host and document granularity.
    text: 'GneissWeb''s annotations come in two granularities: host-level aggregates, which let users
      select hosts meeting quality thresholds, such as hosts where more than half of the high-quality
      pages are categorised as medical or hosts with a high search-engine-style rank but a low GneissWeb
      score; and per-document annotations, with one label per URL. The labels combine quality scoring
      with category labels such as medical, education, technology and science.'
  refs:
  - gneissweb-annotations

- prefix: projects/gneissweb-annotation-testing-v1/hosts/
  copy:
    headline: GneissWeb host-level quality annotations
    lede: The host-level GneissWeb annotations, aggregating per-host data that lets users pick hosts meeting
      quality and category thresholds.
    text: GneissWeb annotations are quality and category labels that Common Crawl computed for every document
      in its crawls, created using IBM Research's GneissWeb dataset and bloom filter, IBM's Data Prep
      Kit, and the GneissWeb category classifiers. This host-level index aggregates those annotations
      per host, letting users select hosts that meet quality thresholds, for example hosts where more
      than half of the high-quality pages are categorised as medical, and combine that with category labels
      such as medical, education, technology and science or with existing filters like language or top-level
      domain. It is the host-level counterpart to the per-URL annotations, and is published both on Hugging
      Face and in Common Crawl's S3 bucket.
  refs:
  - gneissweb-blog

- prefix: projects/gneissweb-annotation-testing-v1/urls/
  copy:
    headline: GneissWeb per-document quality annotations
    lede: The URL-level GneissWeb annotations, with one annotation per document so users can select the
      subset of pages that pass GneissWeb's quality standard.
    text: GneissWeb annotations are quality and category labels that Common Crawl computed for every document
      (URL) in its crawls, created using IBM Research's GneissWeb dataset and bloom filter, IBM's Data
      Prep Kit, and the GneissWeb category classifiers. This URL-level index carries one annotation per
      document, letting users pick out the subset of documents that passes GneissWeb's quality standard
      and identify topics via category labels such as medical, education, technology and science, optionally
      combined with existing annotations like language or top-level domain. It is the document-level counterpart
      to the host-level annotations, and is published both on Hugging Face and in Common Crawl's S3 bucket.
  refs:
  - gneissweb-blog

