- prefix: projects/host-index-testing/
  copy:
    headline: Host Index test releases
    lede: The public test releases of the Host Index, which has one row for every web host in each crawl.
    text: The in-testing versions of the Host Index, a dataset with one row per known web host per crawl
      carrying summary information drawn from the crawl, the indexes, the web graph and Common Crawl's
      raw crawler logs.
  refs:
  - cc-host-index

- prefix: projects/host-index-testing/v2/
  copy:
    headline: Host Index, one row per web host per crawl
    lede: The v2 public test release of the Host Index, a dataset with one row per web host per crawl
      summarising crawl, index, web-graph and crawler-log data.
    text: 'Each row carries summary information drawn from the crawl, the indexes, the web graph and raw
      crawler logs: counts of pages crawled by HTTP status code (successes, redirects, not-found, not-changed
      and so on), robots.txt fetch and bot-defence details, and language-distribution summaries such as
      the fraction of non-English pages. This lets users select hosts that are, for example, mostly in
      English or have an above-average search-engine-style rank. It can be queried directly from AWS with
      SQL tools such as Amazon Athena or DuckDB, or downloaded (around 24 crawls of about 7 GB each).
      Published under the naming convention cchost_index_testing_v2, this is explicitly test rather than
      final data, released for public feedback.'
  refs:
  - hostindex-blog

- prefix: projects/hyperlinkgraph/
  copy:
    headline: Host- and domain-level web graphs
    lede: Common Crawl's regularly released host- and domain-level web graphs for visualising the crawl
