  label: SUCHO — Where do I upload the data? (data ingestion workflow)
  excerpt: You'll also end up with a WACZ file if you're using Browsertrix to crawl sites. If you have
    a WACZ file, go to the WACZ upload form. ... If you have more complicated data, such as the results
    of a custom scrape or a failed crawl, you will need to request AWS access credentials to receive access
