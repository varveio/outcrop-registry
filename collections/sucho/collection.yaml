summary:
  copy:
    headline: Web archives of Ukrainian cultural-heritage websites
    lede: SUCHO (Saving Ukrainian Cultural Heritage Online) is a volunteer initiative that web-archived
      Open Access digitized collections from 3,000+ Ukrainian museum, library, and archive websites during
      the 2022 invasion.
    text: 'Saving Ukrainian Cultural Heritage Online (SUCHO) is an initiative of more than 1,500 international
      volunteers — librarians, archivists, researchers, and programmers — who organized after the 2022
      invasion of Ukraine to capture at-risk digital cultural heritage before the servers hosting it could
      be destroyed, damaged, or taken offline.


      The collection contains web archives of Open Access digitized collections from over 3,000 Ukrainian
      cultural institutions, produced with Webrecorder''s open-source tooling in the WACZ format — zipped
      containers of WARC (Web ARChive) files enriched with metadata, each able to bundle several crawls.
      Individual files range from a few megabytes to several terabytes, and the corpus is updated periodically.'
