  label: SUCHO — Running Browsertrix Crawler locally (crawls output)
  excerpt: Browsertrix Crawler is the tool SUCHO is using to crawl entire sites and copy all their contents
    for the purposes of emulation and replay. ... By the end of a crawl, you will have generated a zipped
    file of a series of Web ARChive (WARC) files. This final zipped file produced by Browsertrix Crawler
    is known as a .wacz file (short for Web Archive Collection Zipped).
  retrieved_at: '2026-06-20'

