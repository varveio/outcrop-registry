schema_version: '0.4'
bucket: sucho-opendata
backend: s3
role: primary
region: eu-central-1

prefixes:
- prefix: archives/
  copy:
    text: Web archives of Open Access digitized collections from Ukrainian cultural institutions, captured
      by SUCHO volunteers as WACZ files — zipped containers of WARC (Web ARChive) records enriched with
      metadata, each able to hold several crawls.
    headline: Web archives of Open Access digitized collections from Ukrainian…
  refs:
  - sucho-registry

- prefix: cloud-crawls/
  copy:
    headline: Output of the hosted Browsertrix Cloud crawling pipeline
    lede: Web archives produced through SUCHO's hosted Browsertrix Cloud instance — the browser-based,
      cloud-run crawler — and the largest body of captures in the collection.
    text: These are the captures generated by SUCHO's hosted Browsertrix Cloud pipeline, the browser-based
      crawling system whose early development was tested through Webrecorder's collaboration with SUCHO
      during the 2022 effort. At 26.5 TB this is the largest body of data in the collection, distinct
      from the locally-run Browsertrix Crawler output under crawls/.
  refs:
  - sucho-workflow

- prefix: crawls/
  copy:
    headline: Output of locally-run Browsertrix Crawler crawls
    lede: Web archives produced by SUCHO volunteers running Browsertrix Crawler locally via Docker, then
      packaged as WACZ.
    text: These are the raw captures from Browsertrix Crawler run locally — the command-line, Docker-based
      crawler SUCHO volunteers used to systematically browse entire sites and copy their contents for
      emulation and replay. Each crawl writes WARC files that are packaged into a .wacz (Web Archive Collection
      Zipped) file, distinct from the hosted Browsertrix Cloud output under cloud-crawls/.
  refs:
  - sucho-browsertrix

- prefix: uploads/gdrive/
  copy:
    headline: Volunteer-contributed uploads staged from Google Drive
    lede: Contributor-supplied archives routed through SUCHO's AWS upload-folder channel, staged from
      Google Drive.
    text: Material contributed through SUCHO's AWS upload-folder workflow — the channel volunteers use
      for WACZ files larger than the 10 GB web-form limit and for more complicated data such as the results
      of a custom scrape or a failed crawl, for which they request AWS credentials and their own upload
      folder. This branch corresponds to contributions staged from Google Drive.
  refs:
  - sucho-data-upload

- prefix: uploads/s3/
  copy:
    headline: Volunteer-contributed uploads staged from S3
    lede: Contributor-supplied archives routed through SUCHO's AWS upload-folder channel, staged from
      contributors' own S3 storage.
    text: Material contributed through SUCHO's AWS upload-folder workflow — the channel volunteers use
      for WACZ files larger than the 10 GB web-form limit and for more complicated data such as the results
      of a custom scrape or a failed crawl, for which they request AWS credentials and their own upload
      folder. This branch corresponds to contributions staged from contributors' own S3 storage.
  refs:
  - sucho-data-upload

