summary:
  copy:
    headline: Blue (incremental) evapotranspiration for Africa from IWMI Water Accounting+
    lede: IWMI's DIWASA Blue ET is a continent-wide, monthly map of the irrigation-driven share of evapotranspiration
      across Africa, derived from SSEBop satellite ET within the Water Accounting+ framework.
    text: Blue ET — the incremental evapotranspiration supplied by blue water (surface water and groundwater)
      rather than rainfall — quantifies consumptive water use in irrigated agriculture, evaporation from
      irrigated fields and artificial storage, and losses from rivers, lakes, and reservoirs. Produced
      by the International Water Management Institute through the Digital Innovation for Water Secure
      Africa (DIWASA) project, it partitions operational SSEBop ET into green and blue components using
      the Water Accounting+ (WA+) mass-balance framework. The collection covers the entire African continent
      on a ~1 km grid (EPSG:4326), monthly from 2003 to 2021, with values in millimetres stored as scaled
      Int16 GeoTIFFs accompanied by STAC items. It supports water-productivity assessment and sustainable
      management of scarce blue-water resources, and is also served via Digital Earth Africa's OGC web
      services and Open Data Cube.
  refs:
  - blueet-dea-specs

