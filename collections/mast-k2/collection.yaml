summary:
  copy:
    headline: NASA K2 mission photometry — full-frame images, light curves, target pixel files
    lede: The K2 mission is the Kepler spacecraft's extended survey, observing 20 fields along the ecliptic
      in successive campaigns, archived at MAST (STScI) as calibrated FITS photometry.
    text: 'K2 is the second-life mission of NASA''s Kepler spacecraft, flown after the 2013 failure of
      a second reaction wheel left the telescope unable to hold its original stare. Instead, K2 pointed
      at a sequence of fields along the ecliptic, each observed for roughly 80 days, with each pointing
      designated a Campaign (c00, c01 … c18). Driven entirely by Guest Investigator proposals, it extended
      Kepler''s high-precision time-series photometry to exoplanet transits, stellar variability, supernovae,
      and solar-system science.


      The archive holds the standard Kepler/K2 product tiers as FITS: full-frame images (raw, calibrated,
      and uncertainty), target pixel files at short or long cadence, and extracted calibrated light curves,
      organized by campaign. The data are hosted by the Mikulski Archive for Space Telescopes at STScI
      and mirrored on AWS in the public stpubdata bucket.'
