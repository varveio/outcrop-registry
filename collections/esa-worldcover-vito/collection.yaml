summary:
  copy:
    headline: Global 10 m land-cover maps for 2020 and 2021
    lede: ESA WorldCover is the first global land-cover product at 10 m resolution, produced by a VITO-led
      consortium for the European Space Agency from Copernicus Sentinel-1 and Sentinel-2 data.
    text: 'ESA WorldCover maps the entire land surface into 11 land-cover classes at approximately 10
      m resolution, derived from Sentinel-1 radar and Sentinel-2 optical imagery. It was generated within
      the ESA WorldCover project under the 5th Earth Observation Envelope Programme (EOEP-5), by a consortium
      led by VITO with Brockmann Consult, CS, Wageningen University & Research, GAMMA Remote Sensing and
      IIASA. Two annual releases are published as Cloud-Optimized GeoTIFFs tiled in a 1° × 1° grid: the
      2020 map (v100, released October 2021) and the improved 2021 map (v200, released October 2022).
      Because the two years were produced with different algorithm versions, differences between them
      reflect a mix of real land-cover change and algorithmic change and should be compared with caution.
      The maps are distributed free of charge under CC-BY-4.0 via Terrascope and the AWS Open Data Registry.'
