summary:
  copy:
    headline: NASA Kepler primary-mission photometry archive
    lede: 'The Kepler mission''s archival data at MAST: four years of high-precision photometry for roughly
      200,000 stars, observed to detect transiting exoplanets.'
    text: NASA's Kepler space telescope monitored about 200,000 stars in a fixed field near the constellation
      Cygnus, producing a calibrated flux time series for each star and searching those light curves for
      the periodic dimming caused by transiting exoplanets. Observations are organized into 90-day quarters,
      reflecting the spacecraft's quarterly 90-degree rolls to keep its solar panels Sun-facing, and were
      taken at long (30-minute) or short (1-minute) cadence. The archive, hosted by the Mikulski Archive
      for Space Telescopes (MAST) at the Space Telescope Science Institute, organizes the science data
      into three product families — light-curve files, target pixel files, and full-frame images — delivered
      as FITS products and keyed by Kepler Input Catalog (KIC) target identifier.
  refs:
  - kepler-missions-data

