summary:
  copy:
    headline: Open archive of shared neuroimaging data
    lede: OpenNeuro is a free, open archive for sharing a broad range of human brain imaging data, released
      under CC0 and mirrored to a public Amazon S3 bucket.
    text: 'OpenNeuro is a BRAIN Initiative data archive that openly shares a broad range of brain imaging
      data types, following the FAIR principles for data sharing. Newly published datasets, and new versions
      of existing ones, are released under a Creative Commons Zero (CC0) public-domain dedication, which
      places no restrictions on use; each version carries a unique DOI for citation and may include a
      HowToAcknowledge field with the provider''s preferred attribution.


      Every dataset is published to the public Amazon S3 bucket s3://openneuro.org/ (us-east-1), which
      anyone can read anonymously with no AWS account using --no-sign-request. No account is required
      to browse or download public datasets; data is reachable through the browser, S3, DataLad, direct
      git, the openneuro-cli, and a GraphQL API. An account is needed only to save datasets, subscribe
      to updates, or manage your own.'
