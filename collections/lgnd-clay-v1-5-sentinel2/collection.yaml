summary:
  copy:
    headline: Global Clay v1.5 embeddings of Sentinel-2 imagery
    lede: LGND Clay v1.5 Sentinel-2 is a near-global set of 1024-dimensional Clay foundation-model embeddings
      of Sentinel-2 L2A imagery, published by LGND on Source Cooperative under CC BY 4.0.
    text: 'This collection encodes Sentinel-2 L2A imagery into 1024-dimensional float32 embedding vectors
      produced by the Clay v1.5 geospatial foundation model, each tied to a 2560-meter MajorTOM grid cell.
      Coverage is near-complete (~99.9%, estimated ~99.7%) across two time steps, June 2024 and June 2025,
      with source imagery drawn from the public sentinel-cogs archive on AWS. The data is split into two
      products: a scene product (~77.9 million embeddings, ~285GB) carrying one record per embedded Sentinel-2
      scene, and an aggregated product (~49.7 million embeddings, ~182GB) that reduces each MajorTOM cell
      to one representative embedding per month for consistent time-series analysis. Both share a common
      schema (chip and cell identifiers, source STAC item, acquisition datetime, the embedding vector,
      bbox, and chip geometry) and ship as hive-partitioned GeoParquet (v1.1, ZSTD level 15, Hilbert spatial
      ordering).'
  refs:
