summary:
  copy:
    headline: Marine vertebrate reference genomes and ocean eDNA sequencing data
    lede: OceanOmics is the Minderoo Foundation's open marine-genomics resource, pairing high-quality
      reference genome assemblies for marine vertebrates with environmental-DNA sequencing data from ocean
      expeditions.
    text: OceanOmics, run by the Minderoo Foundation and based at the University of Western Australia,
      generates and openly shares marine-genomics data to support biodiversity monitoring and conservation.
      It holds two complementary products. Ocean Genomes contributes high-quality reference genome assemblies
      and the underlying long-read sequencing for marine vertebrates — ray-finned and cartilaginous fishes,
      marine mammals, birds and reptiles — with the long-term aim of representing every marine vertebrate
      family. The eDNA program contributes metabarcoding and metagenomics reads from environmental-DNA
      samples collected across expeditions, used to develop eDNA as a scalable way to assess ecosystem
      health. Assemblies, evaluation outputs and raw reads are released in FASTA, BAM and FASTQ formats
      under CC BY 4.0.
