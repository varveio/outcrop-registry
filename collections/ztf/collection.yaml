summary:
  copy:
    headline: Zwicky Transient Facility time-domain optical sky survey
    lede: The Zwicky Transient Facility (ZTF) is a fully-automated wide-field optical survey of the northern
      sky from Palomar, hosted on AWS by NASA/IPAC's Infrared Science Archive as cloud-optimized Parquet
      catalogs.
    text: 'The Zwicky Transient Facility is a time-domain astronomy survey that images the night sky with
      the Samuel Oschin 48-inch Schmidt Telescope at Palomar Observatory and a custom wide-field camera
      in three photometric filters (g, r, i), systematically exploring the optical transient sky since
      March 2018 across roughly 25,000–30,000 square degrees of the northern hemisphere.


      This AWS Open Data copy, published by NASA/IPAC''s Infrared Science Archive (IRSA), holds two ZTF
      public data releases as HATS (Hierarchical Adaptive Tiling Scheme) Parquet catalogs: an Objects
      Table of PSF-fit photometry detections from co-added reference images, and Lightcurves built from
      single-exposure detections at those object locations. DR24 (the enhanced release, observations through
      October 2025) catalogs on the order of a trillion source detections and several billion light curves;
      the contributed DR23 release covers the prior epoch. Each release is organized as a HATS Collection
      — a main sky-partitioned catalog accompanied by an index table and a margin cache.'
  refs:
  - ztf-irsa-homepage
  - ztf-aws-registry
  - ztf-hats-docs

