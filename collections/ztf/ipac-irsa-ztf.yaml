- prefix: contributed/dr23/objects/hats/ztf_dr23_objects-hats_margin_10arcsec/dataset/
  copy:
    headline: ZTF DR23 Objects margin cache (10 arcsec)
    lede: The HATS margin cache for the DR23 Objects catalog, holding rows in a 10-arcsecond border around
      each sky partition for boundary-safe operations.
    text: This margin cache holds the catalog rows within a ~10-arcsecond margin around each partition
      of the DR23 Objects HATS catalog, supplying the padding needed so cross-matching and other neighborhood
