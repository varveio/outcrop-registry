schema_version: '0.4'
bucket: ipac-irsa-ztf
backend: s3
role: primary
region: us-east-1

prefixes:
- prefix: contributed/dr23/lc/hats/ztf_dr23_lc-hats/dataset/
  copy:
    headline: ZTF DR23 Lightcurves — HATS catalog
    lede: The main HATS catalog of the ZTF Data Release 23 Lightcurves, the contributed predecessor of
      the DR24 light-curve catalog built from single-exposure photometry.
    text: This is the primary data product of the DR23 Lightcurves release — light curves assembled from
      single-exposure PSF-fit photometry at the positions of Objects Table detections, for the data release
      spanning observations through October 2024. Delivered under the bucket's contributed area, it is
      the main HATS catalog, partitioned by adaptive HEALPix tile (Norder/Dir/Npix) for position-based
      queries, accompanied by index and margin-cache siblings in the same collection.
  refs:
  - ztf-aws-registry

- prefix: contributed/dr23/lc/hats/ztf_dr23_lc-hats_index_objectid/dataset/index/
  copy:
    headline: ZTF DR23 Lightcurves index by object ID
    lede: The HATS index table for the DR23 Lightcurves catalog, mapping each ZTF object ID to its sky
      partition for lookup by ID rather than coordinates.
    text: This index table maps the ZTF object identifier to the partitions of the DR23 Lightcurves HATS
      catalog, so a specific object's light curve can be retrieved by ID instead of by sky position. It
      is an ancillary dataset of the contributed DR23 Lightcurves HATS Collection, paired with the main
      catalog and the margin cache.
  refs:
  - ztf-hats-docs

- prefix: contributed/dr23/lc/hats/ztf_dr23_lc-hats_margin_10arcsec/dataset/
  copy:
    headline: ZTF DR23 Lightcurves margin cache (10 arcsec)
    lede: The HATS margin cache for the DR23 Lightcurves catalog, holding rows in a 10-arcsecond border
      around each sky partition for boundary-safe operations.
    text: This margin cache holds the light-curve rows within a ~10-arcsecond margin around each partition
      of the DR23 Lightcurves HATS catalog, supplying the padding needed so neighborhood operations and
      cross-matches don't drop sources just across a HEALPix tile boundary. It is an ancillary dataset
      of the contributed DR23 Lightcurves HATS Collection.
  refs:
  - ztf-hats-docs

