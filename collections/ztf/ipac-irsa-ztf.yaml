    text: This is the primary data product of the DR23 Objects Table — PSF-fit photometry detections extracted
      from ZTF reference images, for the data release spanning observations through October 2024. Delivered
      under the bucket's contributed area (the precursor to the DR24 enhanced release), it is the main
