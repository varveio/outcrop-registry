summary:
  copy:
    headline: Digitised specimen images of the National Herbarium of NSW
    lede: The National Herbarium of New South Wales is a 1.43-million-specimen botanical collection whose
      sheets, captured as high-resolution images with their biodiversity metadata, are published openly
      on AWS by the Royal Botanic Gardens and Domain Trust.
    text: 'The National Herbarium of New South Wales is curated by the Australian Institute of Botanical
      Science and managed by the Royal Botanic Gardens and Domain Trust. Its 1.43 million preserved plant
      specimens, dating from 1770 to today, were captured as high-resolution images with the associated
      biodiversity metadata recorded in digital form.


      The imaging ran from 2019 to 2022, when the Institute worked with Picturae, International Conservation
      Services, and Alembo to complete the first mass herbarium imaging project in the Southern Hemisphere,
      using Picturae''s ''herbarium digistreet'' conveyor system installed at the Royal Botanic Garden
      Sydney. The result is published as the public dataset Herbarium NSW on Amazon Web Services.'
