summary:
  copy:
    headline: Poseidon 3D marine seismic survey, Browse Basin, in MDIO format
    lede: The Poseidon 3D Seismic dataset is the imaged offshore Browse Basin survey (~2,900 km2, GDA94
      / MGA Zone 51), released openly by TGS in the cloud-native MDIO v1 format under CC BY 4.0.
    text: 'The Poseidon survey covers roughly 2,900 km2 of the Browse Basin offshore northwest Australia
      and is published as a set of imaged 3D seismic angle stacks: near, mid, far, and a full stack with
      automatic gain control applied, alongside a decimated stacking-velocity field. The data is supplied
      courtesy of ConocoPhillips and Geoscience Australia and is widely used in oil-and-gas exploration
      and as a public benchmark for seismic interpretation and machine learning.


      Each volume is distributed in MDIO v1, TGS''s open-source, Zarr-based format that stores the seismic
      amplitudes, trace headers, and coordinate arrays as chunked, compressed arrays in a single self-describing
      object tree — optimized for cloud-native random access and AI/ML workflows. The original SEG-Y files
      (licensed CC BY 3.0 AU) were obtained via the SEG Open Data Wiki; the MDIO conversion is released
      here under CC BY 4.0. The bucket is public-read with no AWS account required.'
  refs:
