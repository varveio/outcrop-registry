summary:
  copy:
    headline: Indexed on-chain data for eleven blockchains, as date-partitioned Parquet
    lede: AWS Public Blockchain Data is an AWS Open Data initiative providing free, indexed on-chain data
      across eleven chains, transformed into date-partitioned Parquet on a single public S3 bucket.
    text: 'AWS Public Blockchain Data provides free access to blockchain datasets transformed into compressed
      Parquet, partitioned by date for efficient querying, all under one public S3 bucket (arn:aws:s3:::aws-public-blockchain,
      region us-east-2). AWS maintains the Bitcoin and Ethereum sets, backfilled from each chain''s first
      block (Bitcoin 2009, Ethereum 2015) and kept current by an on-chain listener that delivers new data
      daily. A later release adds partner-maintained chains: SonarX, an AWS Partner specializing in blockchain
      data indexing, contributes Aptos, Arbitrum, Base, Provenance, and the XRP Ledger, while Cronos,
      Stellar, and The Open Network (TON) are maintained by their respective organizations. The uniform
      per-chain table layout is designed for cross-chain analysis with Amazon Athena, AWS Glue, and related
      analytics services. Access is anonymous (aws s3 ls --no-sign-request s3://aws-public-blockchain/),
      with no AWS account required.'
