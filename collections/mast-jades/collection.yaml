summary:
  copy:
    headline: JADES — JWST deep imaging and spectroscopy of GOODS-S and GOODS-N
    lede: The JWST Advanced Deep Extragalactic Survey (JADES) is the largest deep extragalactic program
      of JWST's early operations, releasing NIRCam imaging and NIRSpec spectroscopy of the GOODS-S and
      GOODS-N fields through MAST.
    text: 'JADES is a coordinated NIRCam imaging and NIRSpec multi-object spectroscopy survey of the GOODS-S
      and GOODS-N deep fields, carried out by the JWST NIRCam and NIRSpec Guaranteed Time Observation
      teams and published as a MAST High-Level Science Product. It pairs deep multi-band NIRCam mosaics
      with thousands of NIRSpec spectra to study galaxy formation and the early universe.


      The products are organized by release (DR1, DR2, DR3) and field (goods-s, goods-n), splitting into
      imaging mosaics, photometric and spectroscopic catalogs, extracted spectra, and packaged bundles.
      NIRSpec spectra are further keyed by disperser/filter configuration — the low-resolution clear-prism
      plus medium-resolution gratings — and by target depth tier. Data are served from the public stpubdata
      S3 bucket under CC BY 4.0.'
