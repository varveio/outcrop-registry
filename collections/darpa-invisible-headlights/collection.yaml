summary:
  copy:
    headline: Multi-sensor off-road imagery for passive thermal terrain navigation
    lede: The DARPA Invisible Headlights Dataset pairs multispectral, hyperspectral, polarimetric, and
      broadband off-road imagery with aligned LIDAR for autonomous off-road navigation research, released
      under CC BY 4.0.
    text: The DARPA Invisible Headlights Dataset is a large-scale multi-sensor collection annotated for
      autonomous, off-road navigation in challenging environments. Developed with DARPA funding, it features
      simultaneously collected imagery from multispectral, hyperspectral, polarimetric, and broadband
      sensors spanning wavelengths from the visible spectrum to long-wave infrared, with aligned LIDAR
      providing ground-truth shape. It comprises approximately 145 paths from four collection sites across
      the US, gathered across multiple seasons, varied weather, and both day and night, capturing scenes
      and obstacles such as forest, desert, snow, ponds, and fields. Raw sensor captures are organized
      into a four-level collect → path → step → imagery hierarchy, alongside derived data including camera
      calibrations, LiDAR registrations, and traversability annotations for a subset. A subset is publicly
      available; the full dataset is on the AWS Registry of Open Data, licensed under CC BY 4.0.
