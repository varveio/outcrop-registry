summary:
  copy:
    headline: Gaia DR3 source catalog in HATS-partitioned Parquet
    lede: A cloud-native HATS mirror of ESA's Gaia Data Release 3, the ~1.8-billion-source astrometric
      and photometric survey, hosted by STScI on AWS for spatial cross-matching at scale.
    text: 'Gaia Data Release 3 (Gaia DR3) is ESA''s third release from the Gaia mission, processed by
      the Gaia Data Processing and Analysis Consortium (DPAC) and published on 13 June 2022. It catalogs
      roughly 1.8 billion celestial sources, with full astrometry (positions, parallaxes, proper motions)
      for around 1.46 billion of them, multi-band G/GBP/GRP photometry, radial velocities for tens of
      millions of stars, astrophysical parameters, variable-star and quasar/galaxy classifications, and
      solar-system and binary-star data.


      This collection is the Space Telescope Science Institute (MAST) mirror of Gaia DR3 reformatted into
      HATS (Hierarchical Adaptive Tiling Scheme), produced by the LSST Interdisciplinary Network for Collaboration
      and Computing. HATS arranges the catalog into HEALPix-tiled Parquet partitions sized to hold a roughly
      constant object count each, so the data can be queried and cross-matched in parallel with the LSDB
      library — by cone search or by cross-match against other HATS-format catalogs. Alongside the main
      source catalog it ships 10-arcsecond and 300-arcsecond margin-cache neighbor catalogs that make
      boundary-accurate cross-matching possible, plus a source_id index for direct lookups.'
