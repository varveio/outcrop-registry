summary:
  copy:
    headline: Copernicus C-band radar imaging of Earth, day and night
    lede: Sentinel-1 is the Copernicus C-band Synthetic Aperture Radar mission, a constellation of ESA
      radar satellites imaging Earth through cloud and darkness, distributed on AWS by Element 84.
    text: Sentinel-1 is the European Radar Observatory of the Copernicus programme, jointly run by the
      European Commission and the European Space Agency. A constellation of polar-orbiting satellites
      — Sentinel-1A, the now-retired 1B, and Sentinel-1C — carries C-band synthetic aperture radar that
      images the planet day and night and in all weather, because radar is unaffected by cloud or lack
      of sunlight. The mission acquires in four imaging modes spanning resolutions to 5 m and swaths to
      400 km, with dual polarization, short revisit times, and products distributed at Level-0, SLC, GRD,
      and OCN levels. Its data underpins sea-ice and iceberg mapping, glacier-velocity and ground-deformation
      monitoring (subsidence, earthquakes, volcanoes), maritime surveillance, and land and emergency mapping.
      On AWS the imagery is published by Element 84 in the eu-central-1 region under the free, full and
      open Copernicus Sentinel data terms.
  refs:
