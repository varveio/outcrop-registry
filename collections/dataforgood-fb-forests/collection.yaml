summary:
  copy:
    headline: Global 1-meter canopy height maps from Meta and WRI
    lede: The High Resolution Canopy Height Maps (CHM v1) are a global, 1-meter-resolution map of tree
      canopy height built by Data for Good at Meta and the World Resources Institute, resolving individual
      trees worldwide.
    text: The High Resolution Canopy Height Maps are a global tree-canopy-height product released in 2024
      by Data for Good at Meta together with the World Resources Institute, produced by machine-learning
      models trained on high-resolution Maxar satellite imagery. At 1-meter resolution the maps resolve
      individual trees at a global scale, supporting forest monitoring, carbon and biomass estimation,
      and climate work. This collection is the original (v1) product, published as cloud-optimized GeoTIFF
      tiles with per-tile observation-date metadata and quality masks. Coverage includes a global float-valued
      map plus higher-attention regional products for California, Sao Paulo, and Sub-Saharan Africa, alongside
      the released model weights. The data and models are free and openly available under CC-BY-4.0; a
      separate Version 2 product (built on newer imagery) is published as its own collection.
