summary:
  copy:
    headline: DFT-computed properties of inorganic materials
    lede: The Materials Project is an open database of density-functional-theory (DFT) computed properties
      for inorganic materials, distributed on AWS Open Data.
    text: 'The Materials Project publishes DFT-computed materials data openly on AWS, organized into three
      S3 buckets: materialsproject-raw, materialsproject-parsed, and materialsproject-build. The parsed
      bucket contains serialized pymatgen and emmet objects generated by parsing VASP output files, mostly
      as gzip-compressed JSON. The build bucket contains the high-level derived data that backs the MP
      API and website, plus pre-built objects and images; its collections and objects are versioned by
      database release date and grouped into gzip-compressed JSON Lines files. All buckets allow anonymous
      download via the AWS CLI using the --no-sign-request flag.'
  refs:
  - mp-docs-overview
  - mp-homepage

