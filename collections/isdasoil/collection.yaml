summary:
  copy:
    headline: Continent-scale predicted soil-property maps for Africa at 30 m
    lede: iSDAsoil is the first continent-scale soil-property and nutrient map of Africa at 30 m resolution,
      published by iSDA under CC-BY 4.0.
    text: iSDAsoil provides machine-learning predictions of more than 20 soil properties and nutrients
      across the whole of Africa at 30 m resolution, trained on over 100,000 analysed soil samples combined
      with an extensive collection of remote-sensing covariates. Properties span chemistry and fertility
      (pH, organic and total carbon, total nitrogen, extractable phosphorus, potassium, calcium and aluminium
      and other nutrients), physical texture (clay, silt and sand content) and structure (bulk density,
      depth to bedrock), most predicted at two standard depth intervals, 0-20 cm and 20-50 cm, with an
      accompanying model-error layer expressing prediction uncertainty. Every layer is distributed as
      a cloud-optimised GeoTIFF covering the entire continent, with STAC metadata and thumbnails. The
      data is openly accessible from the public s3://isdasoil bucket, the Google Earth Engine catalog
      and a free REST API, and is also published on Zenodo per property.
  refs:
