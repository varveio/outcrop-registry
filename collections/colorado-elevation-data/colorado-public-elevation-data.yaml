prefixes:
- prefix: 2015/
  copy:
    headline: 2015 Colorado lidar DEMs (Montrose/Delta/Gunnison and Routt/Moffat)
    lede: Lidar-derived digital elevation models from the State of Colorado's 2015 acquisition year, covering
      the Montrose-Delta-Gunnison and Routt-Moffat areas of western Colorado.
    text: The 2015 project year holds bare-earth digital elevation models produced from lidar collected
      over western Colorado, grouped by acquisition area — Montrose, Delta and Gunnison counties, and
      the Routt-Moffat region. DEMs are stored as ESRI .img rasters with companion .aux.xml statistics
      sidecars. As one of the earlier project years in the State of Colorado elevation archive, it forms
      part of the multi-year, area-by-area assembly of historical lidar terrain data the OIT GIS team
      has made openly available.
  refs:
  - co-elev-guide-main

