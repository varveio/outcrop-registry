- prefix: DEM/DEM.tiles/
  copy:
    headline: Pre-tiled DEM cache for fast map display
    lede: A pre-rendered tile cache of Colorado elevation, packaged for fast web map and GIS display rather
      than as source raster downloads.
    text: This is a tiled-cache rendering of the elevation data, stored in ESRI compact-cache .bundle
      files under a tile/ hierarchy with accompanying JSON tiling-scheme metadata and a thumbnail. It
      is a display-optimized derivative for streaming the statewide DEM into map viewers and GIS clients,
      distinct from the per-project source DEMs delivered as .img and .tif rasters elsewhere in the collection.
  refs:
  - co-elev-guide-main

- prefix: USGS_one_meter_dem/
  copy:
    headline: USGS one-meter digital elevation models
    lede: One-meter-resolution digital elevation models sourced from the USGS 3D Elevation Program, mirrored
      for Colorado in the State of Colorado elevation archive.
    text: This collection holds USGS one-meter DEMs — high-resolution bare-earth elevation rasters produced
      under the USGS 3D Elevation Program (3DEP) — as GeoTIFF (.tif) files with .aux.xml statistics sidecars,
      following the standard USGS_<project>_<tile> naming convention. Added in 2025, it complements the
      state's own project-year lidar by mirroring the nationally consistent USGS one-meter elevation layer
      for Colorado.
  refs:
  - co-elev-guide-main

- prefix: usdot_data_2025/*/
  copy:
    headline: 2025 USDOT corridor lidar by region
    lede: The State of Colorado's 2025 USDOT lidar collection, organized into one subfolder per region
      or transportation corridor across the Front Range and Colorado's interstate system.
    text: 'Acquired in 2025 in connection with U.S. Department of Transportation corridor work, this lidar
      collection is partitioned by region and corridor: the Denver Regional Council of Governments (DRCOG)
      area, the broader Front Range, the northern and southern I-25 corridors (I25N, I25S2), a series
      of I-70 corridor segments (I70A and I70BC through I70I), plus a tileindex describing the tiling.
      Each subfolder holds the elevation products for its region; together they form the most recent acquisition
      year in the State of Colorado elevation archive, extending dense lidar coverage along the state''s
      primary transportation corridors.'
  refs:
  - co-elev-guide-main

