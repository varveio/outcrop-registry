  copy:
    headline: 2018 Fremont-Custer lidar bare-earth and hydro DEMs
    lede: Bare-earth and hydro-flattened lidar digital elevation models covering Fremont and Custer counties,
      Colorado, from the State of Colorado's 2018 acquisition year.
    text: Part of the 2018 project year, this Fremont-Custer collection contains lidar-derived digital
      elevation models held under a DEM_BARE_HYDRO/ subfolder — bare-earth, hydro-conditioned terrain
