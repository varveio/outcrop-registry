summary:
  copy:
    headline: Statewide Colorado lidar and digital elevation models
    lede: State of Colorado Elevation Data is the Governor's Office of Information Technology GIS team's
      open archive of historical and current lidar-derived elevation models for Colorado, released under
      CC0 on AWS Open Data.
    text: 'Compiled by the Colorado Governor''s Office of Information Technology (OIT) GIS team, this
      collection brings together public elevation data — primarily lidar-derived bare-earth and surface
      digital elevation models (DEMs) — gathered across Colorado over multiple acquisition years. Content
      is organized by project year and area: county and watershed lidar projects from 2015 through 2019
      (many flown for the Colorado Water Conservation Board), a 2025 USDOT corridor lidar collection covering
      Front Range and interstate corridors, USGS-derived one-meter DEMs, and a tiled statewide DEM service.
      The data is dedicated to the public domain under Creative Commons CC0 1.0 and the bucket is readable
      anonymously, so it is freely usable for hazard mapping, hydrology, terrain analysis, and general
      GIS work.'
  refs:
