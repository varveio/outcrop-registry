- prefix: catalogs/
  copy:
    headline: intake-esm catalogs for the LENS-on-AWS stores
    lede: intake-esm catalog files that index the LENS-on-AWS Zarr stores so tools can discover and open
      them by component, frequency, experiment, and variable.
    text: This holds the intake-esm catalog files that enumerate the CESM LENS Zarr stores published on
      AWS. Rather than hand-constructing S3 paths, tools such as intake-esm read these catalogs to discover
      and open the stores automatically, filtering by component, output frequency, experiment, and variable.
  refs:
  - cesmlens-aws-docs

