    text: Six-hourly atmospheric output of the CESM Large Ensemble for the 1990–2005 window, capturing
      sub-daily variability across the ensemble members. Each variable is kept as an independent Zarr
      store, split by experiment, in the Zarr format used throughout the LENS-on-AWS subset.
  refs:
