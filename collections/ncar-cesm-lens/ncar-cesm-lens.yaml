schema_version: '0.4'
bucket: ncar-cesm-lens
backend: s3
role: primary
region: us-west-2

prefixes:
- prefix: atm/
  copy:
    headline: Atmosphere simulation output
    lede: The atmosphere domain of the CESM Large Ensemble, holding surface and volumetric atmospheric
      variables as Zarr stores split by output frequency and experiment.
    text: This domain contains the atmospheric output of the CESM Large Ensemble across the ensemble members.
      It is split first by output frequency — monthly, daily, and 6-hourly windows, plus time-invariant
      static fields — and then by experiment and variable, with each variable kept as an independent Zarr
      store. Variables span both surface (2D) and volumetric (3D) atmospheric fields.
  refs:
  - cesmlens-aws-docs

- prefix: atm/daily/
  copy:
    headline: Daily atmospheric fields
    lede: Daily-frequency atmosphere output of the CESM Large Ensemble, as per-variable Zarr stores split
      by experiment.
    text: Daily atmospheric output of the CESM Large Ensemble, giving day-by-day fields across the ensemble
      members and time. Each variable is kept as an independent Zarr store, split by experiment, in the
      Zarr format used throughout the LENS-on-AWS subset.
  refs:
  - cesmlens-aws-docs

- prefix: atm/hourly6-1990-2005/
