summary:
  copy:
    headline: Community Earth System Model Large Ensemble on AWS
    lede: CESM LENS is NCAR's 40-member ensemble of Community Earth System Model climate simulations for
      1920–2100, with a cloud-optimized subset published on AWS S3 as Zarr stores under CC-BY-4.0.
    text: 'The CESM Large Ensemble lets researchers separate forced climate change from internal variability
      by running many simulations of the same period under identical forcing. All 40 members follow one
      radiative-forcing scenario — historical through 2005, then RCP8.5 — and span 1920 to 2100, covering
      both surface (2D) and volumetric (3D) variables across the atmosphere, ocean, land, and ice domains.


      The complete LENS dataset is roughly 500 TB. NCAR publishes a smaller subset of the most-used variables
      (currently ~70 TB compressed) on AWS S3 through the AWS Public Dataset Program, in the us-west-2
      bucket ncar-cesm-lens. The data are written in the Zarr format as independent stores split by component,
      output frequency, and experiment, with intake-esm catalogs for automated discovery. The AWS subset
      carries its own DOI, distinct from the original full dataset.'
  refs:
  - cesmlens-aws-docs

