summary:
  copy:
    headline: The 1950 U.S. Census, digitized by the National Archives
    lede: NARA's complete digitization of the seventeenth U.S. decennial census, released to the public
      on April 1, 2022 under the 72-Year Rule.
    text: The National Archives and Records Administration's digitization of the U.S. decennial census,
      which the Bureau of the Census conducted to enumerate every person living in the United States as
      of April 1, 1950. At over 165 terabytes, it includes a metadata index, the population schedules
      and other forms, the enumeration district maps, and the enumeration district descriptions. The schedules
      are about 6.5 million scanned TIFF images, with corresponding JPEG derivatives, of the microfilmed
      P1 'Census of Population and Housing' forms together with a scattering of Individual Census Reports
      and other special forms (Crews of Vessels, Overseas, Indian Reservation, American Samoa, and Alaska
      schedules). Because the schedules name and describe individual residents — recording personal details
      such as names, ages, race, place of birth, occupation, and income — the records were withheld for
      72 years under the 72-Year Rule (Public Law 95-416) and released publicly on April 1, 2022. NARA
      published the digitized dataset on the AWS Registry of Open Data.
  refs:
  - nara1950-devdoc
  - nara1950-imagedetails
  - nara1950-72yr

