summary:
  copy:
    headline: Merkle DAG of the world's public source-code archive
    lede: The Software Heritage Graph Dataset is a fully-deduplicated Merkle DAG of Software Heritage,
      the largest public archive of software source code, published under CC-BY-4.0.
    text: Software Heritage is the largest existing public archive of software source code and its development
      history, spanning more than five billion unique source files and one billion unique commits from
      over 80 million projects crawled from development forges like GitHub and GitLab, FOSS distributions
      such as Debian, and language-specific package managers such as PyPI. The Graph Dataset is the fully-deduplicated
      Merkle DAG representation of that archive, linking file content identifiers, source-code directories,
      version-control commits tracking evolution over time, and the full states of VCS repositories observed
      during periodic crawls, together with crawling timestamps recording when and where each artifact
      was seen in the wild. It designates the internal structure of the archive and explicitly excludes
      the file contents themselves, with author and committer information anonymized. The dataset is offered
      as downloadable CSV dumps and Apache Parquet files for local use and as a public Amazon Athena instance
      for interactive analysis, distributed under the Creative Commons Attribution 4.0 International license.
      Use is also governed by the Software Heritage Ethical Charter and the terms of use for bulk access.
  refs:
  - swh-zenodo-record
  - swh-license-terms

