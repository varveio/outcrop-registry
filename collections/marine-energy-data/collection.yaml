- id: med-sequim
  kind: publisher_doc
  url: https://mhkdr.openei.org/submissions/395
  label: MHKDR — Tidal Resource Data from Sequim Bay Inlet, WA (Publicly accessible / CC-BY 4.0)
  excerpt: Data from a Nortek Signature1000 deployed on a lander for 14 days in Aug 2020 in the entrance
    to Sequim Bay, WA. Raw data were processed using the DOLfYN python package and standardized using
    the ME Data Pipeline python package, tsdat version 0.2.12. Processed data were partitioned into 24
    hour increments and saved in the NETCDF file format.
  retrieved_at: '2026-06-20'

- id: med-swan
  kind: publisher_doc
  url: https://mhkdr.openei.org/submissions/326
  label: MHKDR — High Resolution Ocean Surface Wave Hindcast (US Wave) Data (Publicly accessible / CC-BY
    4.0)
  excerpt: This high resolution publicly available long-term wave hindcast dataset will - when complete
    - cover the entire U.S. Exclusive Economic Zone (EEZ). Available data includes the Hawaiian Islands,
    West and Atlantic coasts, Atlantic coasts, and Gulf of Mexico/Puerto Rico.
  retrieved_at: '2026-06-20'

- id: med-umsli
  kind: publisher_doc
  url: https://mhkdr.openei.org/submissions/507
  label: MHKDR — Unobtrusive Multi-static Serial LiDAR Imager (UMSLI) Dataset (Publicly accessible / CC-BY
    4.0)
  excerpt: The dataset contains the data from the field deployment of the Unobtrusive Multi-static Serial
    LiDAR Imager (UMSLI) system at PNNL-Sequim test site in 2017. The dataset contains scanning of manmade
    models of baracuda and turtles as well as technical target placed in the field of view of 6 sets of
    LiDAR transmitter and receiver pairs.
  retrieved_at: '2026-06-20'

- id: med-ustidal
  kind: publisher_doc
  url: https://data.openei.org/submissions/8579
  label: OEDI — High Resolution Tidal Hindcast (US Tidal) Dataset (Publicly accessible / CC-BY 4.0)
  excerpt: This Water Power Technologies Office (WPTO) High Resolution Tidal Hindcast dataset (us-tidal)
    provides standardized tidal energy data for five strategically selected U.S. coastal locations with
    significant tidal energy potential. Generated using FVCOM 4.3.1 (Finite Volume Community Ocean Model),
    each locations' dataset contains one year of high-resolution tidal energy data.
  retrieved_at: '2026-06-20'

- id: med-uwacoustics
  kind: publisher_doc
  url: https://mhkdr.openei.org/submissions/599
  label: MHKDR — Turbine Lander, Sequim Bay (2023-2024) / TEAMER UW Tidal Turbine (Publicly accessible
    / CC-BY 4.0)
  excerpt: This dataset contains environmental monitoring data collected during the deployment of the
    Turbine Lander, a small-scale vertical-axis, cross-flow turbine (1.19 m x 0.85 m) in the inlet to
    Sequim Bay, Washington. The turbine was deployed for 141 days between October 2023 and March 2024.
  retrieved_at: '2026-06-20'

