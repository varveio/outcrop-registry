summary:
  copy:
    headline: DOE marine and hydrokinetic energy data lake
    lede: Marine Energy Data Lake is a cloud-hosted collection of large, complex marine and hydrokinetic
      datasets from the DOE Marine and Hydrokinetic Data Repository (MHKDR), published under CC-BY 4.0.
    text: The Marine and Hydrokinetic Data Repository (MHKDR) gives free access to data generated by projects
      funded by the U.S. Department of Energy's Water Power Technologies Office. It is powered by OpenEI,
      the DOE-sponsored open energy information portal, and developed by the National Laboratory of the
      Rockies (NREL). Especially large or complex datasets are published as Marine Energy Data Lakes,
      curated collections that provide centralized, cloud-based access to big data files on Amazon S3.
      Content is standardized to the FAIR and FARR principles and available under Creative Commons Attribution
      4.0 unless otherwise noted.
