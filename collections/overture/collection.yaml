summary:
  copy:
    headline: Open global map data across six standardized themes
    lede: Overture Maps is a collaboratively built, open map dataset of addresses, base layers, buildings,
      divisions, places, and transportation, published by the Overture Maps Foundation as monthly GeoParquet
      releases.
    text: 'Overture Maps is a global, open map data project run by the Overture Maps Foundation for developers
      building map services and working with geospatial data. It standardizes data from OpenStreetMap
      and more than 200 other open sources into six documented themes — addresses, base, buildings, divisions,
      places, and transportation — each split into feature types and aligned to Overture''s Global Entity
      Reference System (GERS).


      The data ships as cloud-native GeoParquet on Amazon S3 (and Azure), organized into dated monthly
      releases partitioned by theme and type so a reader can scan and pull only the layers they need.
      Licensing is per-theme: base, buildings, divisions, and transportation derive from OpenStreetMap
      and are released under ODbL, while places is CDLA-Permissive-2.0 (with some sub-providers under
      Apache-2.0 or CC0), so the release as a whole is multi-licensed.'
