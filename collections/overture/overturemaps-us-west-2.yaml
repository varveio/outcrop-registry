- prefix: release/2026-04-15.0/
  copy:
    headline: April 2026 monthly Overture GeoParquet release
    lede: The 2026-04-15.0 Overture release is a complete dated snapshot of the global map data across
      all six themes, distributed as GeoParquet partitioned by theme and type.
    text: 'This is the dated monthly Overture snapshot version 2026-04-15.0, one point on Overture''s
      ongoing release timeline (versions in yyyy-mm-dd.x form). It carries the full catalog of core map
      data for that release — addresses, base, buildings, divisions, places, and transportation — laid
      out under theme=<theme>/type=<type>/ as GeoParquet.


      Within each theme the data is split by feature type (for example base into bathymetry, infrastructure,
      land, land_cover, land_use, and water; transportation into segment and connector), letting consumers
      scan and pull only the layers they need. Because the snapshot bundles every theme, it inherits Overture''s
      mixed per-theme licensing: ODbL for the OpenStreetMap-derived themes and CDLA-Permissive-2.0 for
      places.'
  refs:
  - overture-cloud-sources-doc

- prefix: release/2026-05-20.0/
