    lede: The 2026-05-20.0 Overture release is the next dated snapshot of the global map data across all
      six themes, distributed as GeoParquet partitioned by theme and type.
    text: 'This is the dated monthly Overture snapshot version 2026-05-20.0, the release that follows
      2026-04-15.0 on Overture''s ongoing timeline. Like every release it carries the full set of core
      map data — addresses, base, buildings, divisions, places, and transportation — under theme=<theme>/type=<type>/
      as GeoParquet, with each successive snapshot reflecting updated source data.


      The theme/type partitioning lets consumers query or download only the feature types they need rather
      than the whole release. As a complete multi-theme snapshot it inherits Overture''s mixed per-theme
      licensing: ODbL for the OpenStreetMap-derived themes (base, buildings, divisions, transportation)
      and CDLA-Permissive-2.0 for places.'
  refs:
  - overture-cloud-sources-doc

