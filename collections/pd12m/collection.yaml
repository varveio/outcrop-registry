summary:
  copy:
    headline: Public-domain and CC0 image-text dataset for generative model training
    lede: PD12M (Public Domain 12M) is a 12.4-million-pair dataset of public-domain and CC0 images with
      synthetic captions, curated by Spawning for training text-to-image foundation models.
    text: PD12M is the largest public-domain image-text dataset assembled to date, built and curated with
      the Source.Plus platform to address quality problems endemic to web-scraped training data — copyrighted
      material, low-quality images and captions, NSFW content, PII, and link rot. Every pair draws exclusively
      from public-domain and CC0-licensed imagery, recaptioned automatically and passed through quality
      and safety filtering. Images are rehosted on dedicated cloud storage, separate from their originating
      institutions, so the corpus stays intact and does not burden the source hosts. The collection pairs
      parquet metadata (URLs, captions, dimensions, MIME type, MD5 hash, per-image license, and source
      organization) and CLIP ViT-L/14 embeddings with the raw image files, and is also packaged as MosaicML
      StreamingDataset (MDS) shards. The dataset is released under CDLA-Permissive-2.0, with community-driven
      governance mechanisms that remove infringing items and improve provenance over time.
  refs:
