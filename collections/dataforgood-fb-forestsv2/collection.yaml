summary:
  copy:
    headline: Global 1 m canopy height maps from satellite imagery and AI
    lede: Version 2 High Resolution Canopy Height Maps (CHMv2) is a worldwide 1-meter tree-height dataset
      from Meta and the World Resources Institute, derived from Maxar imagery with a DINOv3 vision model
      and calibrated to GEDI lidar.
    text: CHMv2 estimates tree canopy height across the globe at roughly 1-meter resolution, mapping every
      tree, gap, and canopy edge to support forest-health monitoring, restoration tracking, degradation
      detection, and carbon-stock estimation. It is produced by Meta's Data for Good team with the World
      Resources Institute's Land & Carbon Lab, using the DINOv3 self-supervised vision model on sub-meter
      worldwide Maxar satellite imagery, with heights calibrated against GEDI spaceborne lidar. Version
      2 substantially improves accuracy, detail, and global consistency over the 2024 release, raising
      model R-squared from 0.53 to 0.86. The maps are distributed as cloud-optimized GeoTIFF tiles with
      accompanying GeoJSON observation-date metadata, and are also available on Google Earth Engine.
  refs:
