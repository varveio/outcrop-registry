summary:
  copy:
    headline: Open airborne LiDAR point clouds for Canada, by acquisition project
    lede: The LiDAR Point Clouds product of Natural Resources Canada's CanElevation Series publishes airborne
      LiDAR surveys from across Canada as Cloud Optimized Point Cloud (COPC) files, under the Open Government
      Licence – Canada.
    text: Part of NRCan's CanElevation Series, created to support Canada's National Elevation Data Strategy,
      this product gathers airborne LiDAR point clouds acquired across Canada by NRCan and by provincial,
      territorial and municipal partners. Each survey is distributed as its own acquisition project, without
      integration between projects, so density, resolution and acquisition date vary from one project
      to the next. Files use the compressed .LAZ / Cloud Optimized Point Cloud (COPC) format — an octree
      reorganization of a LAZ 1.4 file that supports efficient streaming and visualization over HTTP —
      in NAD83(CSRS) epoch 2010 with the appropriate UTM zone and orthometric elevations referenced to
      CGVD2013. Distributed via AWS S3 under the Open Government Licence – Canada, the files are both
      downloadable for local use and viewable directly via URL. Coverage is ongoing, expanding as new
      acquisitions are completed.
  refs:
