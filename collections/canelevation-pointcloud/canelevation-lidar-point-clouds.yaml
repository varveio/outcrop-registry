prefixes:
- prefix: pointclouds_nuagespoints/
  copy:
    headline: All CanElevation LiDAR acquisition projects, grouped by acquiring source
    lede: The root of the CanElevation LiDAR Point Clouds product, grouping every airborne LiDAR acquisition
      project first by acquiring organization or jurisdiction and then by individual survey.
    text: Groups every airborne LiDAR acquisition project in the CanElevation LiDAR Point Clouds product,
      partitioned first by the acquiring organization or jurisdiction — NRCan and provincial, territorial
      and municipal partners — and then by individual survey. Each survey is distributed as its own acquisition
      project, without integration between projects, so density, resolution and acquisition date vary.
      All point clouds are Cloud Optimized Point Cloud (COPC) .LAZ 1.4 files in NAD83(CSRS)/UTM with CGVD2013
      elevations.
  refs:
  - canelevation-opencanada

