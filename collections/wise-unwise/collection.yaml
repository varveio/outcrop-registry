summary:
  copy:
    headline: unWISE reprocessed WISE/NEOWISE coadds and time-domain catalog
    lede: unWISE is a reprocessing of NASA's Wide-field Infrared Survey Explorer (WISE) imaging that preserves
      native angular resolution and is optimized for forced photometry, hosted by NASA/IPAC IRSA.
    text: 'unWISE reprocesses the WISE and NEOWISE all-sky infrared imaging to improved depth and spatial
      resolution, producing unblurred coadds and source catalogs in the W1 (3.4 micron) and W2 (4.6 micron)
      bands. The reprocessing methodology was developed by Lang (2014), with the coadds and catalogs produced
      by Meisner, Lang & Schlegel, Schlafly, Meisner & Green, and Meisner, Caselden, Schlafly & Kiwy.
      IRSA hosts three unWISE products: the coadded images, the unWISE source catalog, and the unWISE
      Time-Domain Catalog (neo7), the last built from time-resolved coadds that each stack the exposures
      from one biannual sky pass. The data are served from the nasa-irsa-wise S3 bucket through the AWS
      Open Data Sponsorship Program and may be accessed anonymously without AWS credentials.'
  refs:
