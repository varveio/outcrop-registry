summary:
  copy:
    headline: Rapid ASKAP Continuum Survey radio sky data
    lede: The Rapid ASKAP Continuum Survey (RACS) is CSIRO's first large-area radio survey with the ASKAP
      telescope, mapping the entire southern sky in continuum at 887.5 MHz.
    text: 'RACS is an observatory-led survey on CSIRO''s Australian SKA Pathfinder (ASKAP), a 36-dish
      radio telescope in Western Australia that uses Phased Array Feed technology to map the sky at extreme
      survey speed. This collection holds the first data release in the low band (RACS-low1): 799 mosaicked
      Stokes I continuum tile images at 887.5 MHz convolved to 25-arcsec resolution, their matching RMS
      noise maps, and the all-sky source and Gaussian-component catalogues (~2.1 million extragalactic
      sources) derived from them. It is distributed by CSIRO''s Australia Telescope National Facility
      under CC-BY-4.0, supporting studies of radio populations and active galactic nuclei across the southern
      sky from -80 to +30 degrees declination.'
