summary:
  copy:
    headline: SRA run, sample, study, and experiment metadata on AWS
    lede: The cloud-delivered metadata for NCBI's Sequence Read Archive — the queryable run, sample, study,
      and experiment tables that index every public SRA submission, mirrored to S3 for AWS Glue and Amazon
      Athena.
    text: 'This is the AWS-hosted metadata layer of the NCBI Sequence Read Archive (SRA), maintained by
      the National Center for Biotechnology Information at NLM/NIH. It carries the descriptive metadata
      that indexes SRA submissions — run accessions, the experiments, samples, studies, and BioProject/BioSample
      links behind them, plus sequencing attributes such as assay type, platform, instrument, library
      layout, and organism. The tables are published so they can be loaded into AWS Glue and queried with
      Amazon Athena for attribute-based discovery across the archive, and are refreshed daily. This collection
      covers only the metadata bucket: the actual sequence reads (.sra, .bam, .cram, .fastq runs) live
      in separate SRA buckets in the same AWS registry entry and are not part of this mirror.'
  refs:
  - ncbi-sra-registry
  - ncbi-sra-athena-access
  - ncbi-sra-tabledef

