summary:
  copy:
    headline: Nationwide Japanese prefectural 3D point clouds and LiDAR-derived terrain products
    lede: Japan Prefectures, 3D Point Cloud Data is AIGID's open-data publication of high-precision airborne-LiDAR
      point clouds and derived terrain grids for participating Japanese prefectures, released under CC-BY
      4.0.
    text: 'AIGID (the Association for Promotion of Infrastructure Geospatial Information Distribution)
      publishes high-precision 3D point cloud data captured for individual Japanese prefectures, building
      on the multi-year survey effort behind the Virtual Shizuoka work. Coverage is added prefecture by
      prefecture — Tokyo, Yamanashi, Yamagata and Saitama documented as of 2025, with Hyogo, Ishikawa
      and Shimane data also present in the bucket. Source data is acquired by airborne laser surveying
      (LP), mobile mapping systems (MMS), unmanned laser scanning (ULS), UAV drones and narrow multibeam
      sonar. Each prefecture''s deliverables include the original ground point clouds as LAS, plus derived
      products: regular-interval elevation grids (TXT/TIFF), automatically generated contours (DXF), and
      orthophoto / shaded-relief / red-relief imagery (TIFF). Object keys encode prefecture, acquisition
      year and sequence, method, data type, format, coordinate-zone and National Basic Map Grid codes;
      files are distributed as zip (or 7z) archives. The data supports infrastructure maintenance, disaster
      prevention and autonomous-driving applications.'
  refs:
